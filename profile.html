<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Swaply Profile</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
padding-bottom:120px;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:100;
background:rgba(5,5,5,.95);
backdrop-filter:blur(18px);
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:28px;
font-weight:900;
}

.nav{
display:flex;
gap:10px;
}

.nav a{
text-decoration:none;
color:white;
background:#111827;
padding:10px 14px;
border-radius:14px;
font-size:13px;
font-weight:800;
}

/* PROFILE */

.profile{
padding:24px;
max-width:1200px;
margin:auto;
}

.top{
display:flex;
align-items:center;
gap:20px;
margin-bottom:24px;
flex-wrap:wrap;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
background:linear-gradient(135deg,#22c55e,#16a34a);
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:900;
}

.user-info h1{
font-size:34px;
font-weight:900;
margin-bottom:8px;
}

.badge{
display:inline-block;
background:#22c55e;
padding:6px 12px;
border-radius:12px;
font-size:12px;
font-weight:900;
margin-bottom:10px;
}

.bio{
color:#9ca3af;
line-height:1.7;
margin-top:10px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
margin:30px 0;
}

.stat{
background:#111827;
padding:20px;
border-radius:24px;
text-align:center;
}

.stat h2{
font-size:26px;
font-weight:900;
margin-bottom:8px;
}

.stat p{
font-size:13px;
color:#9ca3af;
}

/* BUTTONS */

.actions{
display:flex;
gap:14px;
flex-wrap:wrap;
margin-bottom:30px;
}

.btn{
height:56px;
padding:0 24px;
border:none;
border-radius:18px;
font-size:14px;
font-weight:900;
cursor:pointer;
}

.edit-btn{
background:#22c55e;
color:white;
}

.upload-btn{
background:#111827;
color:white;
border:1px solid rgba(255,255,255,.05);
}

/* PRODUCTS */

.section-title{
font-size:28px;
font-weight:900;
margin-bottom:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:16px;
}

.card{
background:#111827;
border-radius:28px;
overflow:hidden;
cursor:pointer;
transition:.2s;
border:1px solid rgba(255,255,255,.05);
}

.card:hover{
transform:translateY(-4px);
}

.image{
width:100%;
height:220px;
overflow:hidden;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
}

.content{
padding:16px;
}

.title{
font-size:15px;
font-weight:800;
margin-bottom:10px;
line-height:1.5;
}

.price{
font-size:22px;
font-weight:900;
color:#22c55e;
margin-bottom:10px;
}

.meta{
display:flex;
justify-content:space-between;
font-size:12px;
color:#9ca3af;
}

/* MOBILE */

@media(max-width:768px){

.stats{
grid-template-columns:1fr 1fr;
}

.products{
grid-template-columns:1fr 1fr;
gap:12px;
}

.image{
height:170px;
}

.user-info h1{
font-size:26px;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<h1 class="logo">

Swaply

</h1>

<div class="nav">

<a href="browse.html">

Browse

</a>

<a href="chat.html">

Chat

</a>

<a href="#"
onclick="logout()">

Logout

</a>

</div>

</div>

<!-- PROFILE -->

<div class="profile">

<!-- TOP -->

<div class="top">

<div
class="avatar"
id="avatar">

U

</div>

<div class="user-info">

<h1 id="username">

User

</h1>

<div class="badge">

Verified Seller

</div>

<p class="bio">

Welcome to my Swaply profile.

</p>

</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat">

<h2 id="productsCount">

0

</h2>

<p>

Products

</p>

</div>

<div class="stat">

<h2 id="likesCount">

0

</h2>

<p>

Likes

</p>

</div>

<div class="stat">

<h2 id="viewsCount">

0

</h2>

<p>

Views

</p>

</div>

<div class="stat">

<h2>

4.9★

</h2>

<p>

Rating

</p>

</div>

</div>

<!-- ACTIONS -->

<div class="actions">

<button
class="btn edit-btn">

Edit Profile

</button>

<button
class="btn upload-btn"
onclick="window.location.href='upload.html'">

Upload Product

</button>

</div>

<!-- PRODUCTS -->

<h2 class="section-title">

My Products

</h2>

<div
class="products"
id="products">

</div>

</div>

<script>

/* BACKEND */

const BACKEND_URL =
"https://traderbackend.onrender.com";

/* USER */

const currentUser =
JSON.parse(
localStorage.getItem("swaplyUser")
);

/* CHECK LOGIN */

if(!currentUser){

window.location.href =
"login.html";

}

/* USER UI */

document.getElementById(
"username"
).innerText =
currentUser.username;

document.getElementById(
"avatar"
).innerText =
currentUser.username
.charAt(0)
.toUpperCase();

/* LOAD PRODUCTS */

async function loadProducts(){

try{

const res =
await fetch(
`${BACKEND_URL}/products`
);

const products =
await res.json();

/* FILTER USER PRODUCTS */

const userProducts =
products.filter(product => {

return (
product.sellerName ===
currentUser.username
);

});

/* STATS */

document.getElementById(
"productsCount"
).innerText =
userProducts.length;

let totalLikes = 0;
let totalViews = 0;

userProducts.forEach(product => {

totalLikes +=
product.likes || 0;

totalViews +=
product.views || 0;

});

document.getElementById(
"likesCount"
).innerText =
totalLikes;

document.getElementById(
"viewsCount"
).innerText =
totalViews;

/* RENDER */

renderProducts(userProducts);

}catch(err){

console.log(err);

}

}

/* RENDER PRODUCTS */

function renderProducts(products){

const container =
document.getElementById(
"products"
);

container.innerHTML = "";

products.reverse().forEach(product => {

container.innerHTML += `

<div
class="card"
onclick="openProduct('${product._id}')">

<div class="image">

<img src="${
product.images?.[0]
||
'https://via.placeholder.com/500'
}">

</div>

<div class="content">

<h2 class="title">

${product.title}

</h2>

<div class="price">

KSh ${product.price}

</div>

<div class="meta">

<span>

❤️ ${product.likes || 0}

</span>

<span>

👀 ${product.views || 0}

</span>

</div>

</div>

</div>

`;

});

}

/* OPEN */

function openProduct(id){

window.location.href =
`product.html?id=${id}`;

}

/* LOGOUT */

function logout(){

localStorage.removeItem(
"swaplyUser"
);

window.location.href =
"login.html";

}

/* START */

loadProducts();

</script>

</body>
</html>

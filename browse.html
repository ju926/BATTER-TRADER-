<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Swaply Browse</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
}

.card{
transition:.35s;
}

.card:hover{
transform:translateY(-6px);
}

.input{
width:100%;
height:58px;
background:#111827;
border:none;
outline:none;
border-radius:18px;
padding:0 18px;
color:white;
font-size:15px;
}

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:20px;
}

</style>

</head>

<body>

<script>

const API =
"https://traderbackend.onrender.com";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

</script>

<!-- NAVBAR -->

<nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/10">

<div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">

<div>

<h1 class="text-3xl font-black">

Swaply

</h1>

<p class="text-green-400 text-xs font-bold tracking-widest">

BROWSE PRODUCTS

</p>

</div>

<div class="hidden md:flex items-center gap-5">

<a href="index.html"
class="hover:text-green-400 font-bold">

Home

</a>

<a href="upload.html"
class="hover:text-green-400 font-bold">

Sell

</a>

<a href="chat.html"
class="hover:text-green-400 font-bold">

Chat

</a>

<a href="profile.html"
class="hover:text-green-400 font-bold">

Profile

</a>

</div>

</div>

</nav>

<!-- HERO -->

<section class="pt-36 pb-14">

<div class="max-w-7xl mx-auto px-5">

<div class="flex flex-col md:flex-row gap-5 md:items-center md:justify-between">

<div>

<p class="text-green-400 font-black tracking-[5px] mb-4">

MARKETPLACE

</p>

<h1 class="text-5xl md:text-6xl font-black">

Browse Products

</h1>

</div>

<div class="w-full md:w-[350px]">

<input
type="text"
id="searchInput"
placeholder="Search products..."
class="input">

</div>

</div>

</div>

</section>

<!-- PRODUCTS -->

<section class="pb-24">

<div class="max-w-7xl mx-auto px-5">

<div
id="productsContainer"
class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-7">

</div>

</div>

</section>

<!-- MOBILE NAV -->

<div class="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-white/10 z-50">

<div class="grid grid-cols-5">

<a href="index.html"
class="flex flex-col items-center py-3 text-white">

<span class="text-2xl">🏠</span>

<span class="text-[11px] font-bold">

Home

</span>

</a>

<a href="browse.html"
class="flex flex-col items-center py-3 text-green-400">

<span class="text-2xl">🛒</span>

<span class="text-[11px] font-bold">

Browse

</span>

</a>

<a href="upload.html"
class="flex flex-col items-center py-3 text-white">

<span class="text-2xl">➕</span>

<span class="text-[11px] font-bold">

Sell

</span>

</a>

<a href="chat.html"
class="flex flex-col items-center py-3 text-white">

<span class="text-2xl">💬</span>

<span class="text-[11px] font-bold">

Chat

</span>

</a>

<a href="profile.html"
class="flex flex-col items-center py-3 text-white">

<span class="text-2xl">👤</span>

<span class="text-[11px] font-bold">

Profile

</span>

</a>

</div>

</div>

<script>

const container =
document.getElementById(
"productsContainer"
);

let allProducts = [];

/* LOAD PRODUCTS */

async function loadProducts(){

try{

const res =
await fetch(
`${API}/products`
);

const products =
await res.json();

allProducts = products;

displayProducts(products);

}catch(err){

console.log(err);

container.innerHTML = `

<div class="text-center col-span-full py-20">

<h2 class="text-3xl font-black text-red-400">

Failed To Load Products

</h2>

</div>

`;

}

}

/* DISPLAY */

function displayProducts(products){

container.innerHTML = "";

if(products.length === 0){

container.innerHTML = `

<div class="text-center col-span-full py-20">

<h2 class="text-4xl font-black">

No Products Found

</h2>

<p class="text-gray-400 mt-4">

Try another search

</p>

</div>

`;

return;

}

products.forEach(item => {

container.innerHTML += `

<div class="glass rounded-[30px] overflow-hidden card">

<img
src="${
item.images && item.images.length
? item.images[0]
: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200&auto=format&fit=crop'
}"
class="w-full h-72 object-cover">

<div class="p-6">

<div class="flex items-center justify-between mb-4">

<p class="text-xs font-black text-green-400 tracking-widest">

${item.category || "PRODUCT"}

</p>

<p class="text-xs text-gray-400">

👁 ${item.views || 0}

</p>

</div>

<h2 class="text-2xl font-black mb-3 line-clamp-1">

${item.title}

</h2>

<p class="text-green-400 text-3xl font-black mb-4">

KSh ${item.price}

</p>

<p class="text-gray-400 text-sm leading-relaxed mb-5 line-clamp-3">

${item.description}

</p>

<div class="flex items-center justify-between mb-6">

<div class="flex items-center gap-3">

<div class="w-11 h-11 rounded-full overflow-hidden">

<img
src="${
item.sellerAvatar ||
'https://cdn-icons-png.flaticon.com/512/149/149071.png'
}"
class="w-full h-full object-cover">

</div>

<div>

<p class="font-black text-sm">

${item.sellerName}

</p>

<p class="text-xs text-gray-400">

${item.location || "Kenya"}

</p>

</div>

</div>

</div>

<div class="grid grid-cols-2 gap-3">

<a
href="product.html?id=${item._id}"
class="bg-green-500 hover:bg-green-600 h-12 rounded-2xl flex items-center justify-center font-black">

View

</a>

<a
href="chat.html"
class="glass hover:bg-white/10 h-12 rounded-2xl flex items-center justify-center font-black">

Chat

</a>

</div>

</div>

</div>

`;

});

}

/* SEARCH */

document
.getElementById(
"searchInput"
)
.addEventListener(
"input",
e => {

const value =
e.target.value.toLowerCase();

const filtered =
allProducts.filter(item =>

item.title
.toLowerCase()
.includes(value)

||

item.category
.toLowerCase()
.includes(value)

);

displayProducts(filtered);

}
);

loadProducts();

</script>

</body>
</html>

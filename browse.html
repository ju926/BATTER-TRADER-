<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swaply</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- HERO -->
<section class="bg-green-600 text-white p-10">

  <h1 class="text-4xl font-bold mb-6">Swaply Upload Test</h1>

  <!-- UPLOAD FORM -->
  <div class="bg-white text-black p-6 rounded-xl max-w-xl">

    <form id="itemForm" class="space-y-4">

      <input type="text" placeholder="Item Name"
        class="w-full p-3 border rounded-xl" />

      <textarea placeholder="Description"
        class="w-full p-3 border rounded-xl"></textarea>

      <button type="submit"
        class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">
        Upload Item
      </button>

    </form>

  </div>
</section>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
console.log("Page loaded ✔");

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDpVWpHBk7KIimjKOH3TuY-BNk_2JSsuJM",
  authDomain: "swaply-85ea0.firebaseapp.com",
  projectId: "swaply-85ea0",
  storageBucket: "swaply-85ea0.appspot.com",
  messagingSenderId: "450967672050",
  appId: "1:450967672050:web:db926b43a9b9986b00ec6b"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

console.log("Firebase initialized ✔");

// WAIT FOR DOM
document.addEventListener("DOMContentLoaded", () => {

  const form = document.getElementById("itemForm");

  console.log("Form detected:", form);

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    console.log("Button clicked ✔");

    const name = form.querySelector('input').value;
    const desc = form.querySelector('textarea').value;

    if (!name || !desc) {
      alert("Fill all fields");
      return;
    }

    try {
      await db.collection("items").add({
        name,
        description: desc,
        createdAt: new Date()
      });

      alert("Uploaded successfully 🚀");

      form.reset();

    } catch (err) {
      console.error("Firebase error:", err);
      alert("Upload failed — check console");
    }

  });

});
</script>

</body>
</html>

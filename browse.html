<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Browse Items - Swaply</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="p-6 text-3xl font-bold text-green-600">Browse Items</div>

  <div id="items" class="grid md:grid-cols-3 gap-6 p-6"></div>

<script>
const API = "http://localhost:5000";

async function loadItems() {
  const res = await fetch(`${API}/items`);
  const items = await res.json();

  const container = document.getElementById("items");

  container.innerHTML = items.map(item => `
    <div class="bg-white rounded-2xl shadow p-4">
      <img src="${item.image}" class="w-full h-48 object-cover rounded-xl" />

      <h2 class="text-xl font-bold mt-2">${item.name}</h2>
      <p class="text-gray-600">${item.description}</p>
      <p class="text-sm text-gray-500">Wants: ${item.wanted}</p>

      <button onclick="chatSeller('${item.userId}')"
        class="bg-green-600 text-white w-full mt-3 py-2 rounded-xl">
        Chat Seller
      </button>
    </div>
  `).join("");
}

function chatSeller(id) {
  if (!localStorage.getItem("token")) {
    window.location.href = "login.html";
    return;
  }

  alert("Opening private chat with seller: " + id);
}

loadItems();
</script>

</body>
</html>

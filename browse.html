<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Browse Marketplace - Swaply</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Inter',sans-serif;
}

::-webkit-scrollbar{
  width:6px;
}

::-webkit-scrollbar-thumb{
  background:#16a34a;
  border-radius:20px;
}

</style>

</head>

<body class="bg-gradient-to-br from-gray-100 via-white to-green-50 min-h-screen">

<script>

const API =
"https://traderbackend.onrender.com";

const token =
localStorage.getItem("token");

const currentUser =
JSON.parse(localStorage.getItem("user"));

</script>

<!-- NAVBAR -->
<header class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 border-b border-gray-200">

<div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">

<!-- LOGO -->
<div class="flex items-center gap-4">

<div class="w-14 h-14 rounded-3xl bg-green-600 flex items-center justify-center text-white text-3xl font-black shadow-xl">

S

</div>

<div>

<h1 class="text-3xl font-black text-gray-900">

Swaply

</h1>

<p class="text-gray-500">

Marketplace

</p>

</div>

</div>

<!-- NAV -->
<div class="hidden md:flex items-center gap-8">

<a href="index.html"
class="font-bold text-gray-700 hover:text-green-600 transition-all">

Home

</a>

<a href="browse.html"
class="font-bold text-green-600">

Browse

</a>

</div>

<!-- AUTH -->
<div id="authArea"></div>

</div>

</header>

<!-- HERO -->
<section class="max-w-7xl mx-auto px-6 pt-12 pb-8">

<div class="bg-gradient-to-r from-green-600 to-green-500 rounded-[40px] p-10 lg:p-14 text-white shadow-2xl relative overflow-hidden">

<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-white/10 rounded-full blur-3xl"></div>

<div class="relative z-10">

<div class="inline-flex items-center gap-3 bg-white/20 backdrop-blur-xl px-5 py-3 rounded-full font-bold mb-8">

<div class="w-3 h-3 bg-green-300 rounded-full animate-pulse"></div>

Live Marketplace

</div>

<h1 class="text-5xl lg:text-7xl font-black leading-tight mb-8">

Explore
Amazing
Products

</h1>

<p class="text-2xl text-green-100 leading-relaxed max-w-3xl">

Browse premium marketplace listings and connect instantly with sellers through secure live chat.

</p>

</div>

</div>

</section>

<!-- SEARCH -->
<section class="max-w-7xl mx-auto px-6 pb-10">

<div class="bg-white rounded-[35px] shadow-xl border border-gray-100 p-6">

<div class="flex flex-col md:flex-row gap-5">

<input
type="text"
id="searchInput"
placeholder="Search products..."
class="flex-1 border-2 border-gray-200 rounded-2xl px-6 py-5 text-lg outline-none focus:border-green-500 transition-all"/>

<select
id="categoryFilter"
class="border-2 border-gray-200 rounded-2xl px-6 py-5 text-lg outline-none focus:border-green-500 transition-all">

<option value="">All Categories</option>

<option>Phones</option>

<option>Laptops</option>

<option>Fashion</option>

<option>Gaming</option>

<option>Cars</option>

<option>Furniture</option>

<option>Electronics</option>

</select>

<button
onclick="loadItems()"
class="bg-green-600 hover:bg-green-700 transition-all text-white px-10 py-5 rounded-2xl font-black shadow-xl">

Search

</button>

</div>

</div>

</section>

<!-- PRODUCTS -->
<section class="max-w-7xl mx-auto px-6 pb-20">

<div
id="itemsContainer"
class="grid md:grid-cols-2 xl:grid-cols-3 gap-10">

<!-- ITEMS -->

</div>

</section>

<!-- FOOTER -->
<footer class="bg-black text-white py-10">

<div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6">

<div>

<h2 class="text-3xl font-black">

Swaply

</h2>

<p class="text-gray-400 mt-2">

Modern marketplace experience

</p>

</div>

<div class="text-gray-400">

© 2026 Swaply Marketplace

</div>

</div>

</footer>

<script>

const authArea =
document.getElementById("authArea");

if(token && currentUser){

authArea.innerHTML = `

<div class="flex items-center gap-4">

<div class="hidden md:flex items-center gap-3 bg-white px-5 py-3 rounded-2xl shadow-lg border">

<img
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
class="w-10 h-10 rounded-full"/>

<div>

<h3 class="font-black text-gray-900">

${currentUser.username}

</h3>

<p class="text-gray-500 text-sm">

Logged In

</p>

</div>

</div>

<button
onclick="logout()"
class="bg-red-500 hover:bg-red-600 transition-all text-white px-6 py-3 rounded-2xl font-black shadow-xl">

Logout

</button>

</div>

`;

}else{

authArea.innerHTML = `

<div class="flex items-center gap-4">

<a href="login.html">

<button
class="bg-green-600 hover:bg-green-700 transition-all text-white px-6 py-3 rounded-2xl font-black shadow-xl">

Login

</button>

</a>

<a href="register.html">

<button
class="bg-black hover:bg-gray-900 transition-all text-white px-6 py-3 rounded-2xl font-black shadow-xl">

Register

</button>

</a>

</div>

`;

}


// LOGOUT
function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

window.location.href =
"login.html";

}


// LOAD ITEMS
async function loadItems(){

const container =
document.getElementById("itemsContainer");

container.innerHTML = `

<div class="col-span-full text-center py-20">

<div class="inline-block animate-spin rounded-full h-16 w-16 border-b-4 border-green-600 mb-6"></div>

<p class="text-2xl font-black text-gray-700">

Loading marketplace...

</p>

</div>

`;

try{

const res =
await fetch(`${API}/items`);

const items =
await res.json();

const search =
document.getElementById("searchInput")
.value
.toLowerCase();

const category =
document.getElementById("categoryFilter")
.value
.toLowerCase();

const filtered =
items.filter(item => {

const matchSearch =
item.name.toLowerCase().includes(search) ||
item.description.toLowerCase().includes(search);

const matchCategory =
!category ||
item.category.toLowerCase() === category;

return matchSearch && matchCategory;

});

if(filtered.length === 0){

container.innerHTML = `

<div class="col-span-full">

<div class="bg-white rounded-[35px] shadow-xl p-20 text-center">

<div class="text-7xl mb-8">

📦

</div>

<h2 class="text-4xl font-black text-gray-900 mb-5">

No Items Found

</h2>

<p class="text-gray-500 text-xl">

Try another search or category

</p>

</div>

</div>

`;

return;

}

container.innerHTML = "";

filtered.forEach(item => {

container.innerHTML += `

<div class="bg-white rounded-[35px] overflow-hidden shadow-xl border border-gray-100 hover:-translate-y-3 hover:shadow-2xl transition-all duration-300">

<div class="relative">

<img
src="${item.image}"
class="w-full h-80 object-cover"/>

<div class="absolute top-5 left-5 bg-green-600 text-white px-5 py-2 rounded-full font-black shadow-xl">

${item.category}

</div>

</div>

<div class="p-8">

<div class="flex items-center justify-between mb-5">

<h2 class="text-3xl font-black text-gray-900">

${item.name}

</h2>

<div class="text-3xl font-black text-green-600">

KSh ${item.price}

</div>

</div>

<p class="text-gray-600 text-lg leading-relaxed mb-8 line-clamp-3">

${item.description}

</p>

<div class="flex items-center justify-between mb-8">

<div>

<p class="text-gray-500 text-sm">

Seller

</p>

<h3 class="font-black text-xl">

${item.sellerName || "Swaply Seller"}

</h3>

</div>

<div class="bg-gray-100 px-5 py-3 rounded-2xl">

<p class="font-bold text-gray-700">

Wanted:
${item.wanted || "Offers"}

</p>

</div>

</div>

<div class="flex gap-4">

<a
href="chat.html?id=${item._id}"
class="flex-1">

<button
class="w-full bg-green-600 hover:bg-green-700 transition-all text-white py-5 rounded-2xl font-black text-lg shadow-xl">

Chat Seller

</button>

</a>

<button
onclick="shareItem('${item.name}')"
class="bg-black hover:bg-gray-900 transition-all text-white px-6 rounded-2xl font-black shadow-xl">

Share

</button>

</div>

</div>

</div>

`;

});

}catch(err){

container.innerHTML = `

<div class="col-span-full">

<div class="bg-white rounded-[35px] shadow-xl p-20 text-center">

<div class="text-7xl mb-8">

⚠️

</div>

<h2 class="text-4xl font-black text-gray-900 mb-5">

Failed To Load Items

</h2>

<p class="text-gray-500 text-xl">

Please try again later

</p>

</div>

</div>

`;

}

}


// SHARE
function shareItem(name){

if(navigator.share){

navigator.share({

title:name,
text:`Check this item on Swaply: ${name}`

});

}else{

alert("Sharing not supported");

}

}


// INITIAL LOAD
loadItems();

</script>

</body>
  </html>

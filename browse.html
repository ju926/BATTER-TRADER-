<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Items - Swaply</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- NAVBAR -->
<header class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

    <h1 class="text-3xl font-bold text-green-600">Swaply</h1>

    <nav class="hidden md:flex gap-8 font-medium">
      <a href="index.html" class="hover:text-green-600">Home</a>
      <a href="browse.html" class="text-green-600 font-bold">Browse</a>
      <a href="about.html" class="hover:text-green-600">About</a>
      <a href="help.html" class="hover:text-green-600">Help</a>
    </nav>

    <div class="flex gap-3">
      <a href="login.html" class="px-5 py-2 rounded-xl border border-green-600 text-green-600 hover:bg-green-50">
        Login
      </a>

      <a href="register.html" class="px-5 py-2 rounded-xl bg-green-600 text-white hover:bg-green-700">
        Sign Up
      </a>
    </div>

  </div>
</header>

<!-- PAGE TITLE -->
<section class="max-w-7xl mx-auto px-6 py-10">
  <h2 class="text-4xl font-bold">Browse Items</h2>
  <p class="text-gray-600 mt-2">Find items available for swapping or purchase</p>
</section>

<!-- ITEMS GRID -->
<section class="max-w-7xl mx-auto px-6 pb-20">
  <div id="itemsContainer" class="grid md:grid-cols-3 gap-8"></div>
</section>

<!-- SCRIPT -->
<script>
const API = "https://traderbackend.onrender.com/items";

function isLoggedIn() {
  return localStorage.getItem("token");
}

function openChat(itemId, sellerId) {
  if (!isLoggedIn()) {
    alert("You must login to chat with seller");
    window.location.href = "login.html";
    return;
  }

  window.location.href = `chat.html?item=${itemId}&seller=${sellerId}`;
}

// LOAD ITEMS
async function loadItems() {
  const container = document.getElementById("itemsContainer");

  try {
    const res = await fetch(API);
    const items = await res.json();

    container.innerHTML = "";

    items.forEach(item => {

      container.innerHTML += `
        <div class="bg-white rounded-2xl shadow-md overflow-hidden">

          <img src="${item.imageURL || 'https://via.placeholder.com/400'}"
               class="w-full h-56 object-cover" />

          <div class="p-5">

            <h3 class="text-2xl font-bold">${item.name}</h3>
            <p class="text-gray-600 mt-2">${item.description}</p>

            <p class="text-sm text-gray-500 mt-2">
              Category: ${item.category || "N/A"}
            </p>

            <p class="text-sm text-gray-500">
              Wanted: ${item.wanted || "Anything"}
            </p>

            <button
              onclick="openChat('${item._id}', '${item.sellerId || 'unknown'}')"
              class="mt-4 w-full bg-green-600 text-white py-3 rounded-xl hover:bg-green-700">
              Request Swap / Chat Seller
            </button>

          </div>
        </div>
      `;
    });

  } catch (err) {
    console.error("Failed to load items", err);
  }
}

loadItems();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swaply Debug</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-xl mx-auto mt-20 bg-white p-6 rounded-xl shadow">

    <h1 class="text-2xl font-bold mb-4">Swaply Upload Test</h1>

    <form id="itemForm" class="space-y-4">

      <input type="text" placeholder="Item Name"
        class="w-full p-3 border rounded-xl" />

      <textarea placeholder="Description"
        class="w-full p-3 border rounded-xl"></textarea>

      <button type="submit"
        class="w-full bg-green-600 text-white py-3 rounded-xl">
        Upload Item
      </button>

    </form>

  </div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    // 🔥 STEP 1: PROVE JS IS RUNNING
    alert("JS IS RUNNING ✔");

    console.log("Page loaded");

    // 🔥 FIREBASE INIT
    const firebaseConfig = {
      apiKey: "AIzaSyDpVWpHBk7KIimjKOH3TuY-BNk_2JSsuJM",
      authDomain: "swaply-85ea0.firebaseapp.com",
      projectId: "swaply-85ea0",
      storageBucket: "swaply-85ea0.appspot.com",
      messagingSenderId: "450967672050",
      appId: "1:450967672050:web:db926b43a9b9986b00ec6b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    console.log("Firebase ready ✔");

    // 🔥 FORM LOGIC
    const form = document.getElementById("itemForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      alert("BUTTON CLICKED ✔");

      const name = form.querySelector('input').value;
      const desc = form.querySelector('textarea').value;

      if (!name || !desc) {
        alert("Fill all fields");
        return;
      }

      try {
        await db.collection("items").add({
          name,
          description: desc,
          createdAt: new Date()
        });

        alert("UPLOAD SUCCESS 🚀");

        form.reset();

      } catch (err) {
        console.error(err);
        alert("FIREBASE ERROR ❌ (check console)");
      }
    });

  </script>

</body>
</html>

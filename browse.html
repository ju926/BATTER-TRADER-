<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Browse Marketplace - Swaply</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#050505;
overflow-x:hidden;
}

.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.07);
}

.card-hover{
transition:.3s;
}

.card-hover:hover{
transform:translateY(-6px);
}

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:20px;
}

.bottom-nav{
box-shadow:0 -5px 30px rgba(0,0,0,.5);
}

</style>

</head>

<body class="text-white">

<script>

const API =
"https://traderbackend.onrender.com";

const token =
localStorage.getItem("token");

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

</script>

<!-- NAVBAR -->

<nav class="sticky top-0 z-50 glass border-b border-white/10">

<div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between gap-4">

<div>

<h1 class="text-2xl md:text-3xl font-black">

Swaply

</h1>

<p class="text-green-400 text-xs font-bold">

Marketplace

</p>

</div>

<!-- SEARCH -->

<div class="hidden md:flex flex-1 max-w-2xl">

<div class="glass rounded-2xl flex items-center px-4 py-3 w-full">

<input
type="text"
id="searchInput"
placeholder="Search phones, laptops, cars..."
class="bg-transparent outline-none w-full text-white placeholder:text-gray-500">

</div>

</div>

<div id="authButtons"
class="flex items-center gap-3">

<a
href="login.html"
class="bg-green-500 hover:bg-green-600 px-5 py-2 rounded-2xl font-bold">

Login

</a>

</div>

</div>

</nav>

<!-- MOBILE SEARCH -->

<div class="md:hidden p-5">

<div class="glass rounded-2xl flex items-center px-4 py-3">

<input
type="text"
id="mobileSearch"
placeholder="Search marketplace..."
class="bg-transparent outline-none w-full text-white placeholder:text-gray-500">

</div>

</div>

<!-- FILTERS -->

<section class="max-w-7xl mx-auto px-5 py-6">

<div class="flex flex-wrap gap-3">

<button
onclick="filterCategory('all')"
class="category-btn bg-green-500 px-5 py-2 rounded-2xl font-bold">

All

</button>

<button
onclick="filterCategory('Phones')"
class="category-btn glass px-5 py-2 rounded-2xl font-bold">

Phones

</button>

<button
onclick="filterCategory('Laptops')"
class="category-btn glass px-5 py-2 rounded-2xl font-bold">

Laptops

</button>

<button
onclick="filterCategory('Cars')"
class="category-btn glass px-5 py-2 rounded-2xl font-bold">

Cars

</button>

<button
onclick="filterCategory('Fashion')"
class="category-btn glass px-5 py-2 rounded-2xl font-bold">

Fashion

</button>

<button
onclick="filterCategory('Gaming')"
class="category-btn glass px-5 py-2 rounded-2xl font-bold">

Gaming

</button>

<button
onclick="filterCategory('Furniture')"
class="category-btn glass px-5 py-2 rounded-2xl font-bold">

Furniture

</button>

</div>

</section>

<!-- PAGE TITLE -->

<section class="max-w-7xl mx-auto px-5 pt-6 pb-10">

<div class="flex items-center justify-between flex-wrap gap-5">

<div>

<p class="text-green-400 font-black tracking-widest mb-3">

LIVE MARKETPLACE

</p>

<h1 class="text-4xl md:text-6xl font-black">

Browse Products

</h1>

</div>

<select
id="sortSelect"
class="glass px-5 py-3 rounded-2xl outline-none">

<option value="newest">

Newest

</option>

<option value="oldest">

Oldest

</option>

<option value="low">

Lowest Price

</option>

<option value="high">

Highest Price

</option>

</select>

</div>

</section>

<!-- PRODUCTS -->

<section class="max-w-7xl mx-auto px-5 pb-32">

<div
id="productsContainer"
class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">

</div>

</section>

<!-- FLOATING SELL BUTTON -->

<a
href="upload.html"
class="fixed bottom-24 md:bottom-10 right-5 z-50 bg-green-500 hover:bg-green-600 w-16 h-16 rounded-full flex items-center justify-center text-4xl shadow-2xl font-light">

+

</a>

<!-- MOBILE NAV -->

<div class="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-white/10 bottom-nav z-50">

<div class="grid grid-cols-4">

<a
href="index.html"
class="flex flex-col items-center py-3 text-white">

<span class="text-xl">🏠</span>
<span class="text-[11px] font-bold">Home</span>

</a>

<a
href="browse.html"
class="flex flex-col items-center py-3 text-green-400">

<span class="text-xl">🛒</span>
<span class="text-[11px] font-bold">Browse</span>

</a>

<a
href="chat.html"
class="flex flex-col items-center py-3 text-white">

<span class="text-xl">💬</span>
<span class="text-[11px] font-bold">Chat</span>

</a>

<a
href="#"
class="flex flex-col items-center py-3 text-white">

<span class="text-xl">👤</span>
<span class="text-[11px] font-bold">Profile</span>

</a>

</div>

</div>

<script>

let allItems = [];

let currentCategory = "all";

/* LOGIN UI */

const authButtons =
document.getElementById(
"authButtons"
);

if(currentUser){

authButtons.innerHTML = `

<div class="flex items-center gap-3">

<img
src="${
currentUser.avatar ||
'https://cdn-icons-png.flaticon.com/512/149/149071.png'
}"
class="w-11 h-11 rounded-full border-2 border-green-500 object-cover">

<button
onclick="logout()"
class="bg-red-500 hover:bg-red-600 px-5 py-2 rounded-2xl font-bold">

Logout

</button>

</div>

`;

}

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

window.location.reload();

}

/* LOAD PRODUCTS */

async function loadProducts(){

try{

const res =
await fetch(
`${API}/items`
);

const items =
await res.json();

allItems = items;

displayProducts(items);

}catch(err){

console.log(err);

}

}

/* DISPLAY */

function displayProducts(items){

const container =
document.getElementById(
"productsContainer"
);

container.innerHTML = "";

if(items.length === 0){

container.innerHTML = `

<div class="col-span-full">

<div class="glass rounded-3xl p-14 text-center">

<h2 class="text-6xl mb-5">

📦

</h2>

<h2 class="text-3xl font-black mb-4">

No Products Found

</h2>

<p class="text-gray-400 mb-8">

Be the first to upload products.

</p>

<a
href="upload.html"
class="bg-green-500 hover:bg-green-600 px-8 py-4 rounded-2xl font-black">

Upload Item

</a>

</div>

</div>

`;

return;

}

items.forEach(item => {

container.innerHTML += `

<div class="glass rounded-3xl overflow-hidden card-hover">

<div class="relative">

<img
src="${item.image}"
class="w-full h-72 object-cover">

<div class="absolute top-4 left-4">

<div class="bg-black/70 backdrop-blur-lg px-3 py-1 rounded-full text-sm font-bold text-green-400">

${item.category || "Marketplace"}

</div>

</div>

<button
class="absolute top-4 right-4 glass w-11 h-11 rounded-full text-xl">

❤️

</button>

</div>

<div class="p-6">

<div class="flex items-start justify-between gap-3">

<h2 class="text-2xl font-black line-clamp-1">

${item.name}

</h2>

<div class="text-green-400 font-black text-xl whitespace-nowrap">

KSh ${item.price}

</div>

</div>

<p class="text-gray-400 text-sm mt-4 line-clamp-3">

${item.description}

</p>

<div class="flex items-center justify-between mt-5">

<div>

<p class="text-xs text-gray-500">

Seller

</p>

<p class="font-bold">

${item.sellerName || "Anonymous"}

</p>

</div>

<div class="text-green-400 text-sm font-bold">

✔ Verified

</div>

</div>

<div class="grid grid-cols-2 gap-3 mt-6">

<a
href="chat.html"
class="bg-green-500 hover:bg-green-600 py-3 rounded-2xl text-center font-black">

💬 Chat

</a>

<button
class="glass py-3 rounded-2xl font-black">

View

</button>

</div>

</div>

</div>

`;

});

}

/* FILTER */

function filterCategory(category){

currentCategory = category;

document.querySelectorAll(".category-btn")
.forEach(btn => {

btn.classList.remove(
"bg-green-500"
);

btn.classList.add(
"glass"
);

});

event.target.classList.remove(
"glass"
);

event.target.classList.add(
"bg-green-500"
);

if(category === "all"){

displayProducts(allItems);

return;

}

const filtered =
allItems.filter(item =>
(item.category || "")
.toLowerCase()
.includes(
category.toLowerCase()
)
);

displayProducts(filtered);

}

/* SEARCH */

document
.getElementById("searchInput")
.addEventListener("input", searchProducts);

document
.getElementById("mobileSearch")
.addEventListener("input", searchProducts);

function searchProducts(e){

const query =
e.target.value.toLowerCase();

const filtered =
allItems.filter(item =>

(item.name || "")
.toLowerCase()
.includes(query)

||

(item.description || "")
.toLowerCase()
.includes(query)

||

(item.category || "")
.toLowerCase()
.includes(query)

);

displayProducts(filtered);

}

/* SORT */

document
.getElementById("sortSelect")
.addEventListener("change", e => {

let sorted = [...allItems];

if(e.target.value === "newest"){

sorted.reverse();

}

if(e.target.value === "oldest"){

sorted = allItems;

}

if(e.target.value === "low"){

sorted.sort(
(a,b)=>
Number(a.price)-Number(b.price)
);

}

if(e.target.value === "high"){

sorted.sort(
(a,b)=>
Number(b.price)-Number(a.price)
);

}

displayProducts(sorted);

});

loadProducts();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Swaply Marketplace</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
padding-bottom:120px;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:100;
background:rgba(5,5,5,.95);
backdrop-filter:blur(18px);
padding:16px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:28px;
font-weight:900;
}

.nav{
display:flex;
align-items:center;
gap:10px;
}

.nav a{
text-decoration:none;
color:white;
background:#111827;
padding:10px 14px;
border-radius:14px;
font-size:13px;
font-weight:800;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
background:linear-gradient(135deg,#22c55e,#16a34a);
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
font-weight:900;
}

/* SEARCH */

.search-box{
padding:18px;
}

.search{
width:100%;
height:58px;
background:#111827;
border:none;
outline:none;
border-radius:18px;
padding:0 18px;
font-size:15px;
color:white;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:16px;
padding:0 18px;
}

.card{
background:#111827;
border-radius:28px;
overflow:hidden;
cursor:pointer;
transition:.2s;
border:1px solid rgba(255,255,255,.05);
}

.card:hover{
transform:translateY(-4px);
}

.image{
width:100%;
height:220px;
overflow:hidden;
position:relative;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
}

.badge{
position:absolute;
top:12px;
left:12px;
background:#22c55e;
padding:8px 12px;
border-radius:14px;
font-size:11px;
font-weight:900;
}

.content{
padding:16px;
}

.title{
font-size:16px;
font-weight:800;
line-height:1.5;
margin-bottom:10px;
}

.price{
font-size:24px;
font-weight:900;
color:#22c55e;
margin-bottom:12px;
}

.meta{
display:flex;
justify-content:space-between;
font-size:12px;
color:#9ca3af;
margin-bottom:12px;
}

.seller{
display:flex;
align-items:center;
gap:10px;
}

.seller-avatar{
width:38px;
height:38px;
border-radius:50%;
background:linear-gradient(135deg,#22c55e,#16a34a);
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
}

/* FLOAT BUTTON */

.upload-btn{
position:fixed;
bottom:24px;
right:24px;
width:68px;
height:68px;
border-radius:50%;
background:linear-gradient(135deg,#22c55e,#16a34a);
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:900;
color:white;
text-decoration:none;
box-shadow:0 10px 30px rgba(34,197,94,.4);
z-index:999;
}

/* STATES */

.loading,
.empty{
padding:60px;
text-align:center;
font-size:18px;
font-weight:700;
color:#9ca3af;
}

/* MOBILE */

@media(max-width:768px){

.products{
grid-template-columns:1fr 1fr;
gap:12px;
}

.image{
height:170px;
}

.title{
font-size:14px;
}

.price{
font-size:18px;
}

.nav a{
padding:8px 12px;
font-size:12px;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<h1 class="logo">

Swaply

</h1>

<div class="nav">

<a href="index.html">

Home

</a>

<a href="chat.html">

Chat

</a>

<a href="profile.html">

Profile

</a>

<a href="#"
onclick="logout()">

Logout

</a>

<div
class="avatar"
id="userAvatar">

U

</div>

</div>

</div>

<!-- SEARCH -->

<div class="search-box">

<input
type="text"
id="searchInput"
class="search"
placeholder="Search products...">

</div>

<!-- PRODUCTS -->

<div
class="products"
id="products">

<div class="loading">

Loading products...

</div>

</div>

<!-- UPLOAD BUTTON -->

<a
href="upload.html"
class="upload-btn">

+

</a>

<script>

/* BACKEND */

const BACKEND_URL =
"https://traderbackend.onrender.com";

/* USER */

const currentUser =
JSON.parse(
localStorage.getItem("swaplyUser")
);

if(currentUser){

document.getElementById(
"userAvatar"
).innerText =
currentUser.username
.charAt(0)
.toUpperCase();

}

/* PRODUCTS */

let allProducts = [];

/* LOAD PRODUCTS */

async function loadProducts(){

try{

const res =
await fetch(
`${BACKEND_URL}/products`
);

const products =
await res.json();

allProducts = products;

renderProducts(products);

}catch(err){

document.getElementById(
"products"
).innerHTML = `

<div class="empty">

Failed to load products

</div>

`;

}

}

/* RENDER PRODUCTS */

function renderProducts(products){

const container =
document.getElementById(
"products"
);

if(products.length === 0){

container.innerHTML = `

<div class="empty">

No products available

</div>

`;

return;

}

container.innerHTML = "";

products.reverse().forEach(product => {

container.innerHTML += `

<div
class="card"
onclick="openProduct('${product._id}')">

<div class="image">

<img src="${
product.images?.[0]
||
'https://via.placeholder.com/500'
}">

${
product.featured
?
'<div class="badge">Featured</div>'
:
''
}

</div>

<div class="content">

<h2 class="title">

${product.title}

</h2>

<div class="price">

KSh ${product.price}

</div>

<div class="meta">

<span>

📍 ${product.location || 'Kenya'}

</span>

<span>

👀 ${product.views || 0}

</span>

</div>

<div class="seller">

<div class="seller-avatar">

${product.sellerName?.charAt(0) || "U"}

</div>

<div>

<p class="font-bold text-sm">

${product.sellerName || "User"}

</p>

<p class="text-xs text-gray-400">

Seller

</p>

</div>

</div>

</div>

</div>

`;

});

}

/* OPEN PRODUCT */

function openProduct(id){

window.location.href =
`product.html?id=${id}`;

}

/* SEARCH */

document
.getElementById("searchInput")
.addEventListener(
"input",
e => {

const value =
e.target.value.toLowerCase();

const filtered =
allProducts.filter(product => {

return (

product.title
.toLowerCase()
.includes(value)

||

product.category
?.toLowerCase()
.includes(value)

);

});

renderProducts(filtered);

}
);

/* LOGOUT */

function logout(){

localStorage.removeItem(
"swaplyUser"
);

window.location.href =
"login.html";

}

/* START */

loadProducts();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Browse Items - Swaply</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 text-gray-800">

<header class="bg-white shadow sticky top-0 z-50">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<h1 class="text-3xl font-black text-green-600">
Swaply
</h1>

<nav class="flex gap-8 font-semibold">

<a href="index.html">Home</a>
<a href="browse.html" class="text-green-600">Browse</a>
<a href="chat.html">Chat</a>

</nav>

</div>

</header>

<section class="py-20">

<div class="max-w-7xl mx-auto px-6">

<div class="mb-12">

<h2 class="text-5xl font-black mb-3">
Marketplace Items
</h2>

<p class="text-gray-600">
Browse all uploaded products
</p>

</div>

<div id="itemsContainer"
class="grid md:grid-cols-3 gap-8">

</div>

</div>

</section>

<script>

const API = "https://traderbackend.onrender.com";

async function loadItems(){

const res =
await fetch(`${API}/items`);

const items =
await res.json();

const container =
document.getElementById("itemsContainer");

container.innerHTML = "";

items.forEach(item=>{

container.innerHTML += `

<div class="bg-white rounded-3xl overflow-hidden shadow-xl">

<img
src="${item.image}"
class="w-full h-64 object-cover"/>

<div class="p-6">

<h2 class="text-2xl font-black mb-2">
${item.name}
</h2>

<p class="text-gray-600 mb-4">
${item.description}
</p>

<div class="flex justify-between items-center mb-4">

<span class="bg-green-100 text-green-700 px-4 py-2 rounded-full text-sm font-bold">
${item.category}
</span>

<span class="text-xl font-black text-green-600">
KSh ${item.price || 0}
</span>

</div>

<a href="chat.html"
class="block bg-green-600 text-white py-3 rounded-2xl text-center font-black">

Chat Seller

</a>

</div>

</div>

`;

});

}

loadItems();

</script>

</body>
</html>

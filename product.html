<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Swaply Product</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
padding-bottom:120px;
}

.topbar{
position:sticky;
top:0;
z-index:100;
background:rgba(5,5,5,.95);
backdrop-filter:blur(18px);
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:24px;
font-weight:900;
}

.container{
padding:18px;
max-width:1200px;
margin:auto;
}

.image-box{
width:100%;
height:420px;
border-radius:30px;
overflow:hidden;
margin-bottom:20px;
background:#111827;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
}

.title{
font-size:32px;
font-weight:900;
margin-bottom:14px;
line-height:1.4;
}

.price{
font-size:42px;
font-weight:900;
color:#22c55e;
margin-bottom:16px;
}

.meta{
display:flex;
gap:18px;
flex-wrap:wrap;
margin-bottom:20px;
color:#9ca3af;
font-size:14px;
}

.description{
background:#111827;
padding:22px;
border-radius:24px;
line-height:1.8;
margin-bottom:24px;
}

.seller-card{
background:#111827;
padding:20px;
border-radius:24px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:24px;
}

.seller-left{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(135deg,#22c55e,#16a34a);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
}

.seller-name{
font-size:18px;
font-weight:800;
}

.seller-badge{
font-size:13px;
color:#22c55e;
font-weight:700;
}

.actions{
display:flex;
gap:14px;
margin-top:20px;
flex-wrap:wrap;
}

.btn{
flex:1;
height:58px;
border:none;
border-radius:18px;
font-size:15px;
font-weight:800;
cursor:pointer;
}

.chat-btn{
background:#22c55e;
color:white;
}

.offer-btn{
background:#111827;
color:white;
border:1px solid rgba(255,255,255,.08);
}

.like-btn{
background:#dc2626;
color:white;
}

.stats{
display:flex;
gap:16px;
margin-top:14px;
font-size:14px;
color:#9ca3af;
}

.loading{
padding:80px;
text-align:center;
font-size:20px;
font-weight:800;
color:#9ca3af;
}

@media(max-width:768px){

.image-box{
height:300px;
}

.title{
font-size:24px;
}

.price{
font-size:32px;
}

.actions{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="topbar">

<h1 class="logo">

Swaply

</h1>

<a
href="browse.html"
class="text-sm font-bold text-green-500">

Back

</a>

</div>

<div
class="container"
id="productContainer">

<div class="loading">

Loading product...

</div>

</div>

<script>

const BACKEND_URL =
"https://YOUR_BACKEND_URL.onrender.com";

const params =
new URLSearchParams(
window.location.search
);

const productId =
params.get("id");

async function loadProduct(){

try{

const res =
await fetch(
`${BACKEND_URL}/products/${productId}`
);

const product =
await res.json();

renderProduct(product);

}catch(err){

document.getElementById(
"productContainer"
).innerHTML = `

<div class="loading">

Failed to load product

</div>

`;

}

}

function renderProduct(product){

document.getElementById(
"productContainer"
).innerHTML = `

<div class="image-box">

<img src="${
product.images?.[0]
||
'https://via.placeholder.com/800'
}">

</div>

<h1 class="title">

${product.title}

</h1>

<div class="price">

KSh ${product.price}

</div>

<div class="meta">

<span>

📍 ${product.location || 'Kenya'}

</span>

<span>

📦 ${product.condition || 'Used'}

</span>

<span>

🏷 ${product.category || 'General'}

</span>

</div>

<div class="stats">

<span>

👀 ${product.views || 0} Views

</span>

<span id="likesText">

❤️ ${product.likes || 0} Likes

</span>

</div>

<div class="description">

${product.description}

</div>

<div class="seller-card">

<div class="seller-left">

<div class="avatar">

${product.sellerName?.charAt(0) || "U"}

</div>

<div>

<div class="seller-name">

${product.sellerName || "User"}

</div>

<div class="seller-badge">

Verified Seller

</div>

</div>

</div>

</div>

<div class="actions">

<button
class="btn chat-btn"
onclick="chatSeller()">

Chat Seller

</button>

<button
class="btn offer-btn"
onclick="makeOffer()">

Make Offer

</button>

<button
class="btn like-btn"
onclick="likeProduct()">

❤️ Like

</button>

</div>

`;

}

async function likeProduct(){

await fetch(
`${BACKEND_URL}/products/${productId}/like`,
{
method:"POST"
}
);

loadProduct();

}

function chatSeller(){

window.location.href =
`chat.html?seller=${productId}`;

}

function makeOffer(){

const amount =
prompt("Enter your offer amount");

if(!amount) return;

fetch(
`${BACKEND_URL}/offers`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

productId,

amount

})

}
)
.then(() => {

alert("Offer sent");

});

}

loadProduct();

</script>

</body>
</html>

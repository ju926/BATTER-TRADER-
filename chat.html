<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Swaply Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

html,
body{
height:100%;
overflow:hidden;
background:#050505;
}

body{
display:flex;
flex-direction:column;
}

/* TOPBAR */

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:72px;
background:rgba(10,10,10,.95);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.06);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
z-index:999;
}

.logo{
font-size:22px;
font-weight:900;
color:white;
}

.nav{
display:flex;
align-items:center;
gap:10px;
}

.nav a{
text-decoration:none;
color:white;
font-size:13px;
font-weight:800;
padding:10px 14px;
border-radius:14px;
background:#111827;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
background:linear-gradient(135deg,#22c55e,#16a34a);
display:flex;
align-items:center;
justify-content:center;
font-size:15px;
font-weight:900;
color:white;
}

/* MESSAGES */

.messages{
flex:1;
overflow-y:auto;
padding:90px 12px 130px;
}

.message{
margin-bottom:18px;
display:flex;
flex-direction:column;
max-width:86%;
animation:fade .2s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.mine{
margin-left:auto;
}

.bubble{
padding:14px;
border-radius:24px;
position:relative;
word-wrap:break-word;
}

.mine .bubble{
background:#22c55e;
color:white;
border-bottom-right-radius:6px;
}

.other .bubble{
background:#111827;
color:white;
border-bottom-left-radius:6px;
}

.admin .bubble{
background:linear-gradient(135deg,#f59e0b,#ea580c);
color:white;
}

.ai .bubble{
background:linear-gradient(135deg,#7c3aed,#4338ca);
color:white;
}

.username{
font-size:12px;
font-weight:900;
margin-bottom:8px;
opacity:.95;
}

.reply-preview{
background:rgba(255,255,255,.09);
padding:8px;
border-radius:12px;
margin-bottom:10px;
font-size:12px;
}

.reply-btn{
margin-top:10px;
font-size:12px;
font-weight:800;
color:#86efac;
cursor:pointer;
}

.time{
font-size:10px;
margin-top:8px;
opacity:.7;
}

/* INPUT */

.input-area{
position:fixed;
bottom:0;
left:0;
right:0;
background:#050505;
padding:10px;
border-top:1px solid rgba(255,255,255,.06);
z-index:999;
}

.replying-box{
display:none;
background:#111827;
padding:10px;
border-radius:16px;
margin-bottom:10px;
}

.input-wrap{
background:#111827;
border-radius:30px;
display:flex;
align-items:center;
padding:8px;
gap:8px;
}

#messageInput{
flex:1;
height:50px;
background:transparent;
border:none;
outline:none;
color:white;
font-size:16px;
padding:0 10px;
}

.send-btn{
width:52px;
height:52px;
border-radius:50%;
border:none;
background:#22c55e;
color:white;
font-size:20px;
font-weight:900;
cursor:pointer;
}

/* TAG USERS */

.tag-users{
position:fixed;
bottom:95px;
left:10px;
right:10px;
background:#111827;
border-radius:20px;
overflow:hidden;
display:none;
z-index:999;
border:1px solid rgba(255,255,255,.06);
}

.tag-user{
padding:14px;
color:white;
font-weight:800;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,.05);
}

.tag-user:hover{
background:#1f2937;
}

.online{
display:flex;
align-items:center;
gap:6px;
margin-top:3px;
}

.dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:4px;
}

::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:20px;
}

</style>

</head>

<body>

<script>

const API =
"https://traderbackend.onrender.com";

const socket =
io(API);

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!currentUser){

window.location.href =
"login.html";

}

const isAdmin =

currentUser?.role === "admin"

||

currentUser?.email === "admin@swaply.com";

</script>

<!-- TOPBAR -->

<div class="topbar">

<div>

<h1 class="logo">

Swaply

</h1>

<div class="online">

<div class="dot"></div>

<p class="text-green-400 text-xs font-bold">

Community Online

</p>

</div>

</div>

<div class="nav">

<a href="index.html">

Home

</a>

<a href="browse.html">

Browse

</a>

<a
href="#"
onclick="logout()">

Logout

</a>

<div class="avatar">

<script>

document.write(

(currentUser?.username || "U")
.charAt(0)
.toUpperCase()

);

</script>

</div>

</div>

</div>

<!-- MESSAGES -->

<div
id="messages"
class="messages"></div>

<!-- TAG USERS -->

<div
id="tagUsers"
class="tag-users">

<div
class="tag-user"
onclick="tagUser('ai')">

🤖 AI Assistant

</div>

<div
class="tag-user"
onclick="tagUser('admin')">

🛡 Admin

</div>

</div>

<!-- INPUT -->

<div class="input-area">

<div
id="replyingBox"
class="replying-box">

<div class="flex items-center justify-between">

<div>

<p class="text-green-400 text-xs font-bold">

Replying to

</p>

<p
id="replyText"
class="text-white text-sm mt-1"></p>

</div>

<button
onclick="cancelReply()"
class="text-red-400 text-lg">

✕

</button>

</div>

</div>

<form id="chatForm">

<div class="input-wrap">

<button
type="button"
class="text-gray-400 text-xl">

😊

</button>

<input
type="text"
id="messageInput"
placeholder="Type message..."
autocomplete="off">

<button
type="button"
class="text-gray-400 text-xl">

📎

</button>

<button
type="submit"
class="send-btn">

➤

</button>

</div>

</form>

</div>

<script>

const messages =
document.getElementById(
"messages"
);

const messageInput =
document.getElementById(
"messageInput"
);

const tagUsers =
document.getElementById(
"tagUsers"
);

let replyTo = null;

/* ONLINE */

socket.emit(
"userOnline",
currentUser.username
);

/* LOAD */

async function loadMessages(){

try{

const res =
await fetch(
`${API}/messages`
);

const data =
await res.json();

messages.innerHTML = "";

data.forEach(msg => {

appendMessage(msg);

});

}catch(err){

console.log(err);

}

}

loadMessages();

/* TAG USERS */

messageInput.addEventListener(
"input",
() => {

const value =
messageInput.value;

if(value.endsWith("@")){

tagUsers.style.display =
"block";

}else{

tagUsers.style.display =
"none";

}

socket.emit(
"typing",
currentUser.username
);

}
);

function tagUser(name){

messageInput.value +=
`${name} `;

tagUsers.style.display =
"none";

messageInput.focus();

}

/* SEND MESSAGE */

document
.getElementById(
"chatForm"
)
.addEventListener(
"submit",
e => {

e.preventDefault();

const text =
messageInput.value.trim();

if(!text) return;

const msg = {

username:
currentUser.username,

message:text,

admin:isAdmin,

replyTo,

time:new Date()
.toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
})

};

socket.emit(
"sendMessage",
msg
);

messageInput.value = "";

cancelReply();

/* AI */

if(
text.toLowerCase().includes("ai")
){

setTimeout(() => {

appendMessage({

username:"AI",

message:
generateAIReply(text),

ai:true,

time:new Date()
.toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
})

});

},1000);

}

/* ADMIN */

if(
text.toLowerCase().includes("@admin")
&&
!isAdmin
){

setTimeout(() => {

appendMessage({

username:"ADMIN",

message:
"🛡 Admin received your message.",

admin:true,

time:new Date()
.toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
})

});

},1200);

}

}
);

/* RECEIVE */

socket.on(
"receiveMessage",
msg => {

appendMessage(msg);

}
);

/* APPEND */

function appendMessage(data){

const div =
document.createElement(
"div"
);

let type = "other";

if(
data.username === currentUser.username
){

type = "mine";

}

if(data.admin){

type = "admin";

}

if(data.ai){

type = "ai";

}

div.className =
`message ${type}`;

div.innerHTML = `

<div class="bubble">

<div class="username">

${
data.admin
?
"🛡 ADMIN"
:
data.ai
?
"🤖 AI"
:
data.username
}

</div>

${
data.replyTo
?
`
<div class="reply-preview">

↩ ${data.replyTo.username}

<br>

${data.replyTo.message}

</div>
`
:
""
}

<div class="text-[15px] leading-relaxed">

${data.message}

</div>

<div
class="reply-btn"
onclick='replyMessage(${JSON.stringify(data).replace(/'/g,"&apos;")})'>

↩ Reply

</div>

<div class="time">

${data.time}

</div>

</div>

`;

messages.appendChild(div);

messages.scrollTop =
messages.scrollHeight;

}

/* REPLY */

function replyMessage(data){

replyTo = {

username:data.username,

message:data.message

};

document
.getElementById(
"replyingBox"
)
.style.display = "block";

document
.getElementById(
"replyText"
)
.innerText =

`${data.username}: ${data.message}`;

messageInput.focus();

}

function cancelReply(){

replyTo = null;

document
.getElementById(
"replyingBox"
)
.style.display = "none";

}

/* AI REPLIES */

function generateAIReply(text){

text =
text.toLowerCase();

if(
text.includes("phone")
){

return "📱 Browse phones in marketplace.";

}

if(
text.includes("laptop")
){

return "💻 Check Browse for laptops.";

}

if(
text.includes("price")
){

return "💰 Compare prices before trading.";

}

if(
text.includes("hello")
){

return "👋 Hello! Welcome to Swaply.";

}

if(
text.includes("scam")
){

return "⚠ Never send money before meeting seller.";

}

return "🤖 AI Assistant is here to help.";

}

/* LOGOUT */

function logout(){

localStorage.removeItem("user");

localStorage.removeItem("token");

window.location.href =
"login.html";

}

</script>

</body>
</html>

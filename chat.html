<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swaply Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body class="bg-gray-100 h-screen flex">

<!-- USERS LIST -->
<div class="w-1/3 bg-white border-r p-4">
  <h2 class="text-xl font-bold mb-4">Online Users</h2>
  <div id="users"></div>
</div>

<!-- CHAT BOX -->
<div class="flex-1 flex flex-col">

  <div id="messages" class="flex-1 p-4 overflow-y-auto"></div>

  <div class="p-4 bg-white flex gap-2">
    <input id="msg" class="flex-1 border p-3 rounded-xl" placeholder="Type message..." />
    <button onclick="sendMsg()" class="bg-green-600 text-white px-6 rounded-xl">
      Send
    </button>
  </div>

</div>

<script>
const socket = io("https://traderbackend.onrender.com");

const token = localStorage.getItem("token");

if (!token) {
  alert("Login required");
  window.location.href = "login.html";
}

const userId = JSON.parse(atob(token.split(".")[1])).id;

let currentChat = null;

socket.emit("join", userId);

// ONLINE USERS
socket.on("onlineUsers", (users) => {
  document.getElementById("users").innerHTML = users
    .filter(u => u !== userId)
    .map(u => `
      <div onclick="openChat('${u}')"
        class="p-3 border-b cursor-pointer hover:bg-gray-100">
        🟢 User ${u.slice(0,6)}
      </div>
    `).join("");
});

function openChat(id) {
  currentChat = id;
  loadMessages();
}

// LOAD MESSAGES
async function loadMessages() {
  if (!currentChat) return;

  const res = await fetch(`${socket.io.uri}/messages/${currentChat}`, {
    headers: { Authorization: token }
  });

  const data = await res.json();

  document.getElementById("messages").innerHTML = data.map(m => `
    <div class="p-2 m-2 max-w-xs rounded-xl ${
      m.from === userId ? "bg-green-600 text-white ml-auto" : "bg-white"
    }">
      ${m.text}
    </div>
  `).join("");
}

// SEND MESSAGE
function sendMsg() {
  const text = document.getElementById("msg").value;

  socket.emit("sendMessage", {
    from: userId,
    to: currentChat,
    text
  });

  document.getElementById("msg").value = "";
}

// LIVE UPDATE
socket.on("newMessage", loadMessages);

// AUTO REFRESH
setInterval(loadMessages, 2000);

</script>

</body>
</html>

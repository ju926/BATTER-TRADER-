<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Swaply Premium Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Inter',sans-serif;
}

.scrollbar-hide::-webkit-scrollbar{
  display:none;
}

</style>

</head>

<body class="bg-gradient-to-br from-gray-100 via-white to-green-50 min-h-screen">

<!-- TOP BAR -->
<header class="backdrop-blur-xl bg-white/70 border-b sticky top-0 z-50">

<div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">

<div class="flex items-center gap-4">

<div class="w-14 h-14 rounded-2xl bg-green-600 flex items-center justify-center text-white text-2xl font-black shadow-xl">

S

</div>

<div>

<h1 class="text-3xl font-black text-gray-900">
Swaply Chat
</h1>

<p class="text-gray-500 text-sm">
Private marketplace conversation
</p>

</div>

</div>

<div class="flex items-center gap-3">

<div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>

<p class="font-semibold text-green-700">
Live
</p>

</div>

</div>

</header>

<!-- MAIN -->
<div class="max-w-7xl mx-auto px-6 py-10">

<div class="grid lg:grid-cols-3 gap-10">

<!-- LEFT -->
<div class="lg:col-span-1">

<div class="bg-white rounded-[35px] shadow-2xl overflow-hidden border border-gray-100 sticky top-28">

<!-- ITEM -->
<div id="itemHeader">

<div class="animate-pulse p-8">

<div class="h-80 bg-gray-200 rounded-3xl mb-6"></div>

<div class="h-10 bg-gray-200 rounded w-2/3 mb-4"></div>

<div class="h-5 bg-gray-200 rounded w-full mb-2"></div>

<div class="h-5 bg-gray-200 rounded w-5/6"></div>

</div>

</div>

</div>

</div>

<!-- RIGHT -->
<div class="lg:col-span-2">

<div class="bg-white rounded-[35px] shadow-2xl overflow-hidden border border-gray-100">

<!-- CHAT HEADER -->
<div class="px-8 py-6 border-b bg-gradient-to-r from-green-600 to-green-500 text-white">

<div class="flex items-center justify-between">

<div>

<h2 class="text-3xl font-black">
Live Conversation
</h2>

<p class="text-green-100">
Chat securely with seller
</p>

</div>

<div class="flex items-center gap-3 bg-white/20 px-5 py-3 rounded-2xl backdrop-blur-xl">

<div class="w-3 h-3 bg-green-300 rounded-full animate-pulse"></div>

<p class="font-bold">
Encrypted
</p>

</div>

</div>

</div>

<!-- MESSAGES -->
<div
id="messages"
class="h-[600px] overflow-y-auto p-8 bg-gradient-to-b from-gray-50 to-white space-y-6 scrollbar-hide">

<!-- Welcome -->
<div class="text-center">

<div class="inline-block bg-green-100 text-green-700 px-6 py-3 rounded-full font-bold">

Welcome to Swaply private chat

</div>

</div>

</div>

<!-- INPUT -->
<div class="border-t bg-white p-6">

<div class="flex flex-col md:flex-row gap-4">

<input
type="text"
id="username"
placeholder="Your Name"
class="md:w-52 border-2 border-gray-200 rounded-2xl px-5 py-4 outline-none focus:border-green-500 transition-all"/>

<div class="flex-1 flex gap-4">

<input
type="text"
id="messageInput"
placeholder="Type your message..."
class="flex-1 border-2 border-gray-200 rounded-2xl px-6 py-4 outline-none focus:border-green-500 transition-all"/>

<button
onclick="sendMessage()"
class="bg-green-600 hover:bg-green-700 active:scale-95 transition-all text-white px-10 rounded-2xl font-black shadow-xl">

Send

</button>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

const API =
"https://traderbackend.onrender.com";

const socket =
io(API);

const params =
new URLSearchParams(window.location.search);

const itemId =
params.get("id");

const room =
`item-${itemId}`;

socket.emit("joinRoom", room);

const messages =
document.getElementById("messages");


// LOAD ITEM
async function loadItem(){

try{

const res =
await fetch(`${API}/items/${itemId}`);

const item =
await res.json();

document.getElementById("itemHeader").innerHTML = `

<img
src="${item.image}"
class="w-full h-96 object-cover"/>

<div class="p-8">

<div class="flex items-center justify-between mb-5">

<div class="bg-green-100 text-green-700 px-5 py-3 rounded-full font-black">

${item.category}

</div>

<div class="text-4xl font-black text-green-600">

KSh ${item.price || 0}

</div>

</div>

<h1 class="text-4xl font-black text-gray-900 mb-5">

${item.name}

</h1>

<p class="text-gray-600 leading-relaxed text-lg mb-8">

${item.description}

</p>

<div class="grid grid-cols-2 gap-4">

<div class="bg-gray-100 rounded-2xl p-5">

<p class="text-gray-500 text-sm mb-2">
Seller
</p>

<h3 class="font-black text-xl">
${item.sellerName || "Swaply Seller"}
</h3>

</div>

<div class="bg-gray-100 rounded-2xl p-5">

<p class="text-gray-500 text-sm mb-2">
Marketplace
</p>

<h3 class="font-black text-xl">
Swaply
</h3>

</div>

</div>

</div>

`;

}catch(err){

console.log(err);

}

}

loadItem();


// PREVIOUS MESSAGES
socket.on("previousMessages", (msgs)=>{

msgs.forEach(data=>{

appendMessage(data);

});

messages.scrollTop =
messages.scrollHeight;

});


// RECEIVE MESSAGE
socket.on("receiveMessage", (data)=>{

appendMessage(data);

messages.scrollTop =
messages.scrollHeight;

});


// APPEND MESSAGE
function appendMessage(data){

messages.innerHTML += `

<div class="flex flex-col items-end">

<div class="text-sm text-gray-500 mb-2 font-semibold">

${data.sender}

</div>

<div class="bg-green-600 text-white px-6 py-5 rounded-[28px] rounded-br-md max-w-xl shadow-xl text-lg leading-relaxed">

${data.text}

</div>

<div class="text-xs text-gray-400 mt-2">

${new Date(data.createdAt).toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit'
})}

</div>

</div>

`;

}


// SEND MESSAGE
function sendMessage(){

const input =
document.getElementById("messageInput");

const username =
document.getElementById("username");

if(!input.value.trim()) return;

socket.emit("sendMessage", {

room,

sender:
username.value || "Anonymous",

message:
input.value

});

input.value = "";

}


// ENTER KEY
document
.getElementById("messageInput")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){

sendMessage();

}

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Swaply Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
height:100%;
overflow:hidden;
font-family:'Inter',sans-serif;
background:#050505;
}

.chat-bg{
background:
linear-gradient(
rgba(0,0,0,.88),
rgba(0,0,0,.92)),
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
}

::-webkit-scrollbar{
width:4px;
}

::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:20px;
}

.mention{
color:#22c55e;
font-weight:800;
}

.message{
animation:fade .2s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.reply-box{
border-left:3px solid #22c55e;
}

#messages{
scroll-behavior:smooth;
padding-bottom:120px;
}

.mobile-input{
position:fixed;
bottom:0;
left:0;
right:0;
z-index:999;
}

</style>

</head>

<body class="chat-bg">

<script>

const API =
"https://traderbackend.onrender.com";

const socket =
io(API);

const token =
localStorage.getItem("token");

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!token || !currentUser){

window.location.href =
"login.html";

}

</script>

<div class="flex h-screen overflow-hidden">

<!-- SIDEBAR -->
<div class="hidden lg:flex w-[260px] glass border-r border-white/10 flex-col">

<div class="p-5 border-b border-white/10">

<h1 class="text-2xl font-black text-white">

Swaply

</h1>

<p class="text-green-400 text-sm font-bold">

Community Chat

</p>

</div>

<div class="p-5">

<div class="glass rounded-3xl p-4">

<div class="flex items-center gap-3">

<img
src="${
currentUser.avatar ||
'https://cdn-icons-png.flaticon.com/512/149/149071.png'
}"
class="w-14 h-14 rounded-full object-cover border-2 border-green-500">

<div>

<h2 class="text-white font-black">

${currentUser.username}

</h2>

<p class="text-green-400 text-sm">

Online

</p>

</div>

</div>

</div>

<div class="mt-5 space-y-3">

<a
href="index.html"
class="block bg-white/5 hover:bg-white/10 text-white text-center py-3 rounded-2xl text-sm font-bold">

Home

</a>

<a
href="browse.html"
class="block bg-green-500 hover:bg-green-600 text-white text-center py-3 rounded-2xl text-sm font-bold">

Browse

</a>

<button
onclick="logout()"
class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-2xl text-sm font-bold">

Logout

</button>

</div>

</div>

</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col h-screen">

<!-- TOP -->
<div class="glass border-b border-white/10 px-4 py-4 flex items-center justify-between shrink-0">

<div>

<h2 class="text-lg md:text-2xl font-black text-white">

Swaply Community

</h2>

<p class="text-green-400 text-xs md:text-sm font-bold">

Buy • Sell • Negotiate • AI

</p>

</div>

<div class="flex gap-2">

<a
href="index.html"
class="bg-white/10 text-white px-3 py-2 rounded-xl text-xs font-bold">

Home

</a>

<a
href="browse.html"
class="bg-green-500 text-white px-3 py-2 rounded-xl text-xs font-bold">

Browse

</a>

</div>

</div>

<!-- MESSAGES -->
<div
id="messages"
class="flex-1 overflow-y-auto px-3 py-4 space-y-4">

<div class="glass rounded-3xl p-5 max-w-[700px]">

<h2 class="text-white text-2xl font-black mb-3">

Welcome 👋

</h2>

<p class="text-gray-300 leading-relaxed text-sm">

Mention
<span class="mention">@ai</span>
for AI help or
<span class="mention">@admin</span>
for admin assistance.

</p>

</div>

</div>

</div>

<!-- REPLY PREVIEW -->
<div
id="replyPreview"
class="hidden mobile-input mb-[70px] mx-3 glass rounded-2xl p-3">

<div class="flex items-center justify-between">

<div>

<p
id="replyUser"
class="text-green-400 text-xs font-black">

</p>

<p
id="replyText"
class="text-white text-xs truncate max-w-[220px]">

</p>

</div>

<button
onclick="cancelReply()"
class="text-red-400 text-sm font-black">

✕

</button>

</div>

</div>

<!-- INPUT -->
<div class="mobile-input glass border-t border-white/10 p-3">

<!-- MENTIONS -->
<div
id="mentionBox"
class="hidden absolute bottom-20 left-3 right-3 glass rounded-2xl overflow-hidden z-50 max-h-60 overflow-y-auto">

</div>

<div class="flex items-center gap-2">

<input
type="text"
id="messageInput"
placeholder="Type message..."
class="flex-1 h-11 bg-black/40 border border-white/10 rounded-2xl px-4 text-white placeholder:text-gray-500 outline-none text-sm focus:border-green-500">

<button
onclick="sendMessage()"
class="bg-green-500 hover:bg-green-600 text-white px-4 h-11 rounded-2xl text-sm font-bold shrink-0">

Send

</button>

</div>

</div>

<script>

let users = [];

let replyingTo = null;

/* USER ONLINE */

socket.emit(
"user_online",
currentUser.id
);

/* LOAD USERS */

async function loadUsers(){

try{

const res =
await fetch(`${API}/users`);

users =
await res.json();

}catch(err){

console.log(err);

}

}

loadUsers();

/* INPUT */

const input =
document.getElementById(
"messageInput"
);

/* MENTIONS */

input.addEventListener(
"input",
function(){

const value =
input.value;

const words =
value.split(" ");

const lastWord =
words[words.length - 1];

if(lastWord.startsWith("@")){

showMentions(lastWord);

}else{

hideMentions();

}

}
);

function showMentions(search = ""){

const box =
document.getElementById(
"mentionBox"
);

box.innerHTML = "";

const special = [

{
username:"@ai",
name:"🤖 AI Assistant"
},

{
username:"@admin",
name:"👑 Admin"
}

];

special.forEach(user => {

if(
user.username
.toLowerCase()
.includes(search.toLowerCase())
){

box.innerHTML += `

<div
onclick="selectMention('${user.username}')"
class="p-3 hover:bg-white/10 cursor-pointer text-white font-bold text-sm">

${user.name}

</div>

`;

}

});

users.forEach(user => {

const username =
"@" + user.username;

if(
username
.toLowerCase()
.includes(search.toLowerCase())
){

box.innerHTML += `

<div
onclick="selectMention('${username}')"
class="p-3 hover:bg-white/10 cursor-pointer text-white text-sm">

🟢 ${user.username}

</div>

`;

}

});

if(box.innerHTML.trim() === ""){

hideMentions();

return;

}

box.classList.remove("hidden");

}

function selectMention(username){

const words =
input.value.split(" ");

words.pop();

words.push(username);

input.value =
words.join(" ") + " ";

input.focus();

hideMentions();

}

function hideMentions(){

document
.getElementById(
"mentionBox"
)
.classList.add("hidden");

}

/* ENTER SEND */

input.addEventListener(
"keypress",
function(e){

if(e.key === "Enter"){

sendMessage();

}

}
);

/* REPLY */

function replyMessage(message){

replyingTo = message;

document
.getElementById(
"replyPreview"
)
.classList.remove("hidden");

document
.getElementById(
"replyUser"
)
.innerText =
`Replying to ${message.senderName}`;

document
.getElementById(
"replyText"
)
.innerText =
message.text;

}

function cancelReply(){

replyingTo = null;

document
.getElementById(
"replyPreview"
)
.classList.add("hidden");

}

/* SEND */

function sendMessage(){

const text =
input.value.trim();

if(!text) return;

socket.emit(
"send_message",
{

senderId:
currentUser.id,

senderName:
currentUser.username,

receiverId:"GLOBAL",

text,

replyTo:
replyingTo ?
replyingTo.senderName :
"",

replyText:
replyingTo ?
replyingTo.text :
""

}
);

input.value = "";

hideMentions();

cancelReply();

}

/* RECEIVE */

socket.on(
"receive_message",
message => {

renderMessage(message);

}
);

/* RENDER */

function renderMessage(message){

const messages =
document.getElementById(
"messages"
);

let badge = "";

if(
message.senderId === "AI" ||
message.senderName === "AI Assistant"
){

badge =
`<span class="text-green-400 text-[10px] font-black">AI</span>`;

}

if(message.senderId === "ADMIN"){

badge =
`<span class="text-yellow-400 text-[10px] font-black">ADMIN</span>`;

}

let replyHTML = "";

if(message.replyText){

replyHTML = `

<div class="reply-box bg-black/30 rounded-xl p-3 mb-3">

<p class="text-green-400 font-black text-[11px]">

${message.replyTo}

</p>

<p class="text-gray-300 text-xs truncate">

${message.replyText}

</p>

</div>

`;

}

messages.innerHTML += `

<div class="message">

<div class="glass rounded-3xl p-4 max-w-[95%] md:max-w-[700px]">

<div class="flex items-center justify-between mb-3">

<div class="flex items-center gap-3">

<div class="w-9 h-9 rounded-xl bg-green-500 flex items-center justify-center text-white text-sm font-black shrink-0">

${message.senderName
.charAt(0)
.toUpperCase()}

</div>

<div>

<h3 class="text-white font-black text-sm">

${message.senderName}

${badge}

</h3>

<p class="text-gray-400 text-[10px]">

${new Date(message.createdAt)
.toLocaleTimeString()}

</p>

</div>

</div>

<button
onclick='replyMessage(${JSON.stringify(message)})'
class="text-green-400 text-[11px] font-bold shrink-0">

Reply

</button>

</div>

${replyHTML}

<p class="text-gray-200 text-sm leading-relaxed whitespace-pre-wrap break-words">

${highlightMentions(message.text)}

</p>

</div>

</div>

`;

messages.scrollTop =
messages.scrollHeight;

}

/* HIGHLIGHT */

function highlightMentions(text){

return text.replace(
/@(\w+)/g,
'<span class="mention">@$1</span>'
);

}

/* LOAD OLD */

async function loadMessages(){

try{

const res =
await fetch(
`${API}/messages`
);

const data =
await res.json();

data.forEach(message => {

renderMessage(message);

});

}catch(err){

console.log(err);

}

}

loadMessages();

/* LOGOUT */

async function logout(){

try{

await fetch(
`${API}/logout`,
{

method:"POST",

headers:{
Authorization:token
}

}
);

}catch(err){}

socket.emit(
"logout",
currentUser.id
);

localStorage.removeItem(
"token"
);

localStorage.removeItem(
"user"
);

window.location.href =
"login.html";

}

/* MOBILE KEYBOARD FIX */

window.addEventListener(
"resize",
() => {

const messages =
document.getElementById(
"messages"
);

messages.scrollTop =
messages.scrollHeight;

}
);

</script>

</body>
   </html>

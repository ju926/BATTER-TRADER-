<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Swaply Community Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
height:100%;
overflow:hidden;
font-family:'Inter',sans-serif;
background:#050505;
}

body{
display:flex;
flex-direction:column;
}

.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.07);
}

#messages{
flex:1;
overflow-y:auto;
padding:120px 14px 130px;
scroll-behavior:smooth;
}

.message{
max-width:85%;
margin-bottom:18px;
animation:fade .2s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.mine{
margin-left:auto;
}

.bubble{
padding:14px;
border-radius:24px;
word-wrap:break-word;
}

.mine .bubble{
background:#22c55e;
color:white;
border-bottom-right-radius:8px;
}

.other .bubble{
background:#111827;
color:white;
border-bottom-left-radius:8px;
}

.admin .bubble{
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
border-bottom-left-radius:8px;
}

.ai .bubble{
background:linear-gradient(135deg,#7c3aed,#4f46e5);
color:white;
border-bottom-left-radius:8px;
}

.username{
font-size:12px;
font-weight:800;
margin-bottom:6px;
opacity:.8;
}

.time{
font-size:10px;
opacity:.7;
margin-top:6px;
}

#chatForm{
position:fixed;
bottom:0;
left:0;
right:0;
padding:12px;
background:#050505;
z-index:50;
}

#messageInput{
height:55px;
font-size:16px;
}

.tag-box{
position:absolute;
bottom:80px;
left:14px;
right:14px;
max-height:200px;
overflow-y:auto;
display:none;
z-index:100;
}

.tag-item{
padding:14px;
cursor:pointer;
transition:.2s;
}

.tag-item:hover{
background:rgba(255,255,255,.05);
}

.reply-box{
display:none;
margin-bottom:10px;
padding:10px;
border-radius:18px;
background:rgba(255,255,255,.05);
}

.reply-line{
font-size:12px;
color:#22c55e;
font-weight:700;
margin-bottom:4px;
}

.online-dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
}

::-webkit-scrollbar{
width:4px;
}

::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:20px;
}

</style>

</head>

<body>

<script>

const API =
"https://traderbackend.onrender.com";

const socket =
io(API);

const token =
localStorage.getItem("token");

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!token){

window.location.href =
"login.html";

}

const isAdmin =
currentUser?.role === "admin"
||
currentUser?.username === "admin"
||
currentUser?.username === "swaplyadmin";

</script>

<!-- TOP BAR -->

<div class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/10">

<div class="flex items-center justify-between px-4 py-4">

<div class="flex items-center gap-3">

<a
href="index.html"
class="text-white text-2xl">

←

</a>

<div>

<h1 class="text-white text-xl font-black">

Swaply Chat

</h1>

<div class="flex items-center gap-2 mt-1">

<div class="online-dot"></div>

<p class="text-green-400 text-xs font-bold">

Community Online

</p>

</div>

</div>

</div>

<div class="flex items-center gap-3">

<div class="hidden md:block text-right">

<p class="text-white font-black text-sm">

${currentUser?.username || "User"}

</p>

<p class="text-green-400 text-xs">

${isAdmin ? "🛡 ADMIN" : "Online"}

</p>

</div>

<img
src="${
currentUser?.avatar ||
'https://cdn-icons-png.flaticon.com/512/149/149071.png'
}"
class="w-11 h-11 rounded-full border-2 border-green-500 object-cover">

</div>

</div>

</div>

<!-- MESSAGES -->

<div id="messages"></div>

<!-- TAG USERS -->

<div
id="tagBox"
class="tag-box glass rounded-3xl">

<div
class="tag-item text-white font-bold"
onclick="tagUser('ai')">

🤖 AI Assistant

</div>

<div
class="tag-item text-white font-bold"
onclick="tagUser('admin')">

🛡 Admin

</div>

</div>

<!-- CHAT INPUT -->

<form
id="chatForm">

<div class="max-w-5xl mx-auto">

<!-- REPLY BOX -->

<div
id="replyBox"
class="reply-box">

<div class="flex items-center justify-between">

<div>

<p class="reply-line">

Replying to

</p>

<p
id="replyText"
class="text-white text-sm"></p>

</div>

<button
type="button"
onclick="cancelReply()"
class="text-red-400 font-bold">

✕

</button>

</div>

</div>

<div class="glass rounded-[30px] p-3 flex items-center gap-3">

<button
type="button"
class="text-2xl text-gray-400">

😊

</button>

<input
type="text"
id="messageInput"
placeholder="Type message..."
autocomplete="off"
class="flex-1 bg-transparent outline-none text-white placeholder:text-gray-500 px-2">

<button
type="button"
class="text-2xl text-gray-400">

📎

</button>

<button
type="submit"
class="bg-green-500 hover:bg-green-600 text-white px-6 h-[55px] rounded-2xl font-black text-lg shrink-0">

Send

</button>

</div>

</div>

</form>

<script>

const messages =
document.getElementById(
"messages"
);

const messageInput =
document.getElementById(
"messageInput"
);

const tagBox =
document.getElementById(
"tagBox"
);

let replyTo = null;

/* LOAD SAVED CHATS */

const savedMessages =
JSON.parse(
localStorage.getItem(
"swaply_messages"
) || "[]"
);

savedMessages.forEach(msg => {

appendMessage(msg);

});

/* SAVE */

function saveMessage(msg){

savedMessages.push(msg);

localStorage.setItem(
"swaply_messages",
JSON.stringify(savedMessages)
);

}

/* TAGGING */

messageInput.addEventListener(
"input",
() => {

const value =
messageInput.value;

if(value.includes("@")){

tagBox.style.display =
"block";

}else{

tagBox.style.display =
"none";

}

}
);

function tagUser(name){

messageInput.value =
messageInput.value.replace(
/@\w*$/,
`@${name} `
);

tagBox.style.display =
"none";

messageInput.focus();

}

/* SEND */

document
.getElementById(
"chatForm"
)
.addEventListener(
"submit",
e => {

e.preventDefault();

const text =
messageInput.value.trim();

if(!text) return;

const msg = {

username:
currentUser.username,

message:text,

replyTo,

admin:isAdmin,

time:new Date()
.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

};

socket.emit(
"sendMessage",
msg
);

appendMessage(msg);

saveMessage(msg);

messageInput.value = "";

replyTo = null;

document
.getElementById(
"replyBox"
)
.style.display = "none";

/* AI */

if(
text.toLowerCase().includes("@ai")
){

setTimeout(() => {

const aiMsg = {

username:"AI",

message:
getAIResponse(text),

ai:true,

time:new Date()
.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

};

appendMessage(aiMsg);

saveMessage(aiMsg);

},1000);

}

/* ADMIN AUTO */

if(
text.toLowerCase().includes("@admin")
&&
!isAdmin
){

setTimeout(() => {

const adminMsg = {

username:"ADMIN",

message:
"🛡 Admin has received your message and will respond shortly.",

admin:true,

time:new Date()
.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

};

appendMessage(adminMsg);

saveMessage(adminMsg);

},1200);

}

}
);

/* RECEIVE */

socket.on(
"receiveMessage",
msg => {

appendMessage(msg);

}
);

/* APPEND */

function appendMessage(data){

const div =
document.createElement(
"div"
);

let type = "other";

if(data.username === currentUser.username){

type = "mine";

}

if(data.admin){

type = "admin";

}

if(data.ai){

type = "ai";

}

div.className =
`message ${type}`;

div.innerHTML = `

<div
class="bubble"
onclick='replyMessage(${JSON.stringify(data.message)})'>

<div class="username">

${
data.admin
?
"🛡 ADMIN"
:
data.ai
?
"🤖 AI"
:
data.username
}

</div>

${
data.replyTo
?
`
<div class="glass rounded-2xl p-2 mb-3 text-sm opacity-80">
↩ ${data.replyTo}
</div>
`
:
""
}

<div class="text-[15px] leading-relaxed">

${data.message}

</div>

<div class="time">

${data.time}

</div>

</div>

`;

messages.appendChild(div);

messages.scrollTop =
messages.scrollHeight;

}

/* REPLY */

function replyMessage(text){

replyTo = text;

document
.getElementById(
"replyBox"
)
.style.display = "block";

document
.getElementById(
"replyText"
)
innerText = text;

messageInput.focus();

}

function cancelReply(){

replyTo = null;

document
.getElementById(
"replyBox"
)
.style.display = "none";

}

/* AI */

function getAIResponse(text){

text = text.toLowerCase();

if(text.includes("phone")){

return "📱 You can browse phones in the marketplace section.";

}

if(text.includes("price")){

return "💰 Compare multiple listings before buying.";

}

if(text.includes("laptop")){

return "💻 Many laptops are available in browse section.";

}

if(text.includes("hello")){

return "👋 Hello! How can I assist you today?";

}

if(text.includes("scam")){

return "⚠ Never pay before meeting seller physically.";

}

return "🤖 AI Assistant is here to help you trade safely.";

}

/* MOBILE FIX */

setTimeout(() => {

messages.scrollTop =
messages.scrollHeight;

},500);

</script>

</body>
   </html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Swaply Live Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Inter',sans-serif;
}

::-webkit-scrollbar{
  width:6px;
}

::-webkit-scrollbar-thumb{
  background:#16a34a;
  border-radius:20px;
}

</style>

</head>

<body class="bg-gradient-to-br from-gray-100 via-white to-green-50 min-h-screen flex flex-col">

<script>

const API =
"https://traderbackend.onrender.com";

const socket =
io(API);

const token =
localStorage.getItem("token");

const currentUser =
JSON.parse(localStorage.getItem("user"));


// LOGIN REQUIRED
if(!token || !currentUser){

window.location.href =
"login.html";

}

</script>

<!-- NAVBAR -->
<header class="bg-white border-b border-gray-200 shadow-sm">

<div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">

<div class="flex items-center gap-4">

<div class="w-14 h-14 rounded-3xl bg-green-600 flex items-center justify-center text-white text-3xl font-black shadow-xl">

S

</div>

<div>

<h1 class="text-3xl font-black text-gray-900">

Swaply Chat

</h1>

<p class="text-gray-500">

Secure Marketplace Messaging

</p>

</div>

</div>

<div class="flex items-center gap-4">

<div class="hidden md:flex items-center gap-3 bg-gray-100 px-5 py-3 rounded-2xl">

<img
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
class="w-10 h-10 rounded-full"/>

<div>

<h3 class="font-black text-gray-900">

<span id="username">

</span>

</h3>

<p class="text-green-600 text-sm font-bold">

Online

</p>

</div>

</div>

<button
onclick="logout()"
class="bg-red-500 hover:bg-red-600 transition-all text-white px-6 py-3 rounded-2xl font-black shadow-xl">

Logout

</button>

</div>

</div>

</header>

<!-- MAIN -->
<div class="flex-1 max-w-7xl mx-auto w-full px-6 py-8">

<div class="grid lg:grid-cols-4 gap-8 h-[80vh]">

<!-- SIDEBAR -->
<div class="bg-white rounded-[35px] shadow-xl border border-gray-100 p-6 overflow-y-auto">

<div class="flex items-center justify-between mb-8">

<h2 class="text-2xl font-black text-gray-900">

Online Users

</h2>

<div class="bg-green-100 text-green-700 px-4 py-2 rounded-full font-black">

LIVE

</div>

</div>

<div
id="usersContainer"
class="space-y-4">

</div>

</div>

<!-- CHAT AREA -->
<div class="lg:col-span-3 bg-white rounded-[35px] shadow-xl border border-gray-100 flex flex-col overflow-hidden">

<!-- TOP -->
<div class="border-b border-gray-100 px-8 py-6 flex items-center justify-between">

<div>

<h2 class="text-3xl font-black text-gray-900">

Marketplace Chat

</h2>

<p class="text-gray-500 mt-1">

Private live messaging system

</p>

</div>

<div class="bg-green-100 text-green-700 px-5 py-3 rounded-2xl font-black">

Encrypted

</div>

</div>

<!-- MESSAGES -->
<div
id="messages"
class="flex-1 overflow-y-auto p-8 space-y-6 bg-gradient-to-b from-white to-gray-50">

</div>

<!-- INPUT -->
<div class="border-t border-gray-100 p-6">

<div class="flex gap-4">

<input
type="text"
id="messageInput"
placeholder="Type your message..."
class="flex-1 border-2 border-gray-200 rounded-2xl px-6 py-5 text-lg outline-none focus:border-green-500 transition-all"/>

<button
onclick="sendMessage()"
class="bg-green-600 hover:bg-green-700 transition-all text-white px-10 rounded-2xl font-black text-lg shadow-xl">

Send

</button>

</div>

</div>

</div>

</div>

</div>

<script>

document.getElementById("username")
.innerText =
currentUser.username;


// USER ONLINE
socket.emit(
"user_online",
currentUser.id
);


// LOAD USERS
async function loadUsers(){

try{

const res =
await fetch(`${API}/users`);

const users =
await res.json();

const container =
document.getElementById("usersContainer");

container.innerHTML = "";

users.forEach(user => {

container.innerHTML += `

<div class="flex items-center justify-between bg-gray-50 hover:bg-gray-100 transition-all p-4 rounded-2xl">

<div class="flex items-center gap-4">

<div class="relative">

<img
src="${user.avatar}"
class="w-14 h-14 rounded-full object-cover"/>

<div class="absolute bottom-0 right-0 w-4 h-4 rounded-full border-2 border-white
${user.online ? 'bg-green-500' : 'bg-gray-400'}">

</div>

</div>

<div>

<h3 class="font-black text-gray-900">

${user.username}

</h3>

<p class="text-sm
${user.online ? 'text-green-600' : 'text-gray-500'} font-bold">

${user.online ? 'Online' : 'Offline'}

</p>

</div>

</div>

</div>

`;

});

}catch(err){

console.log(err);

}

}


// LOAD MESSAGES
async function loadMessages(){

try{

const res =
await fetch(`${API}/messages`);

const messages =
await res.json();

const container =
document.getElementById("messages");

container.innerHTML = "";

messages.forEach(message => {

const mine =
message.senderId === currentUser.id;

container.innerHTML += `

<div class="flex
${mine ? 'justify-end' : 'justify-start'}">

<div class="
${mine
? 'bg-green-600 text-white'
: 'bg-gray-200 text-gray-900'}
max-w-[75%]
rounded-[30px]
px-6
py-5
shadow-lg">

<div class="font-black mb-2">

${message.senderName || "User"}

</div>

<div class="text-lg leading-relaxed">

${message.text}

</div>

<div class="text-xs opacity-70 mt-3">

${new Date(message.createdAt)
.toLocaleTimeString()}

</div>

</div>

</div>

`;

});

container.scrollTop =
container.scrollHeight;

}catch(err){

console.log(err);

}

}


// SEND MESSAGE
function sendMessage(){

const input =
document.getElementById("messageInput");

const text =
input.value.trim();

if(!text) return;

socket.emit("send_message", {

senderId:
currentUser.id,

senderName:
currentUser.username,

receiverId:
"global",

text

});

input.value = "";

}


// RECEIVE MESSAGE
socket.on(
"receive_message",
message => {

const container =
document.getElementById("messages");

const mine =
message.senderId === currentUser.id;

container.innerHTML += `

<div class="flex
${mine ? 'justify-end' : 'justify-start'}">

<div class="
${mine
? 'bg-green-600 text-white'
: 'bg-gray-200 text-gray-900'}
max-w-[75%]
rounded-[30px]
px-6
py-5
shadow-lg">

<div class="font-black mb-2">

${message.senderName || "User"}

</div>

<div class="text-lg leading-relaxed">

${message.text}

</div>

<div class="text-xs opacity-70 mt-3">

${new Date(message.createdAt)
.toLocaleTimeString()}

</div>

</div>

</div>

`;

container.scrollTop =
container.scrollHeight;

}
);


// REFRESH USERS
socket.on(
"refresh_users",
() => {

loadUsers();

}
);


// ENTER SEND
document
.getElementById("messageInput")
.addEventListener(
"keypress",
e => {

if(e.key === "Enter"){

sendMessage();

}

}
);


// LOGOUT
async function logout(){

try{

await fetch(`${API}/logout`,{

method:"POST",

headers:{
Authorization:token
}

});

}catch(err){}

socket.emit(
"logout",
currentUser.id
);

localStorage.removeItem("token");

localStorage.removeItem("user");

window.location.href =
"login.html";

}


// INITIAL LOAD
loadUsers();

loadMessages();

</script>

</body>
</html>

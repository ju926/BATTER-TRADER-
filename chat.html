<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>
Swaply Chat
</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

html,
body{
height:100%;
overflow:hidden;
background:#050505;
color:white;
}

/* GLASS */

.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
}

/* LAYOUT */

.chat-layout{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:350px;
border-right:1px solid rgba(255,255,255,.08);
background:#070707;
display:flex;
flex-direction:column;
}

.logo{
padding:25px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo h1{
font-size:32px;
font-weight:900;
}

.logo p{
color:#22c55e;
font-size:12px;
font-weight:800;
letter-spacing:3px;
margin-top:5px;
}

.search{
padding:18px;
}

.search input{
width:100%;
height:52px;
background:#111827;
border:none;
outline:none;
border-radius:18px;
padding:0 18px;
color:white;
font-size:15px;
}

/* USERS */

.users{
flex:1;
overflow-y:auto;
padding:0 12px 20px;
}

.user{
display:flex;
align-items:center;
gap:14px;
padding:14px;
border-radius:22px;
cursor:pointer;
transition:.3s;
margin-bottom:10px;
}

.user:hover{
background:rgba(255,255,255,.06);
}

.user.active{
background:#22c55e;
color:black;
}

.user img{
width:58px;
height:58px;
border-radius:50%;
object-fit:cover;
border:2px solid #22c55e;
}

.online{
width:12px;
height:12px;
border-radius:50%;
background:#22c55e;
position:absolute;
bottom:0;
right:0;
border:2px solid black;
}

/* CHAT AREA */

.chat-area{
flex:1;
display:flex;
flex-direction:column;
}

/* TOPBAR */

.topbar{
height:85px;
padding:0 25px;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
align-items:center;
justify-content:space-between;
background:#050505;
}

.top-user{
display:flex;
align-items:center;
gap:15px;
}

.top-user img{
width:58px;
height:58px;
border-radius:50%;
object-fit:cover;
border:2px solid #22c55e;
}

/* MESSAGES */

.messages{
flex:1;
overflow-y:auto;
padding:30px;
display:flex;
flex-direction:column;
gap:18px;
background:
linear-gradient(
rgba(0,0,0,.92),
rgba(0,0,0,.95)
),
url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

.message{
max-width:75%;
animation:fade .2s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.mine{
margin-left:auto;
}

.bubble{
padding:18px;
border-radius:28px;
position:relative;
}

.mine .bubble{
background:#22c55e;
color:white;
border-bottom-right-radius:8px;
}

.other .bubble{
background:#111827;
color:white;
border-bottom-left-radius:8px;
}

.admin .bubble{
background:linear-gradient(135deg,#f59e0b,#ea580c);
}

.ai .bubble{
background:linear-gradient(135deg,#7c3aed,#4338ca);
}

.username{
font-size:12px;
font-weight:900;
margin-bottom:8px;
opacity:.9;
}

.time{
font-size:10px;
margin-top:8px;
opacity:.7;
}

/* INPUT */

.input-area{
padding:18px;
border-top:1px solid rgba(255,255,255,.08);
background:#050505;
}

.input-wrap{
display:flex;
align-items:center;
gap:12px;
background:#111827;
padding:10px;
border-radius:28px;
}

.input-wrap input{
flex:1;
height:52px;
background:transparent;
border:none;
outline:none;
color:white;
font-size:16px;
padding:0 10px;
}

.send-btn{
width:55px;
height:55px;
border:none;
border-radius:50%;
background:#22c55e;
font-size:20px;
font-weight:900;
color:white;
cursor:pointer;
}

/* MOBILE */

.mobile-nav{
display:none;
}

@media(max-width:900px){

.sidebar{
display:none;
}

.mobile-nav{
display:grid;
position:fixed;
bottom:0;
left:0;
right:0;
grid-template-columns:repeat(5,1fr);
background:rgba(10,10,10,.95);
backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,.08);
z-index:999;
}

.mobile-nav a{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:12px 0;
text-decoration:none;
color:white;
font-size:11px;
font-weight:800;
}

.messages{
padding-bottom:120px;
}

}

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:20px;
}

</style>

</head>

<body>

<script>

const API =
"https://traderbackend.onrender.com";

const socket =
io(API);

const currentUser =
JSON.parse(
localStorage.getItem(
"swaplyUser"
)
);

if(!currentUser){

window.location.href =
"login.html";

}

const isAdmin =

currentUser?.role === "admin"

||

currentUser?.email === "admin@swaply.com";

</script>

<div class="chat-layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<h1>

Swaply

</h1>

<p>

LIVE CHAT

</p>

</div>

<div class="search">

<input
type="text"
placeholder="Search chats...">

</div>

<div class="users">

<div class="user active">

<div class="relative">

<img
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<div class="online"></div>

</div>

<div>

<h2 class="font-black">

Community Chat

</h2>

<p class="text-sm opacity-70 mt-1">

Everyone is here

</p>

</div>

</div>

<div class="user">

<div class="relative">

<img
src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png">

<div class="online"></div>

</div>

<div>

<h2 class="font-black">

AI Assistant

</h2>

<p class="text-sm opacity-70 mt-1">

Always online

</p>

</div>

</div>

<div class="user">

<div class="relative">

<img
src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png">

<div class="online"></div>

</div>

<div>

<h2 class="font-black">

Marketplace Admin

</h2>

<p class="text-sm opacity-70 mt-1">

Support Team

</p>

</div>

</div>

</div>

</div>

<!-- CHAT AREA -->

<div class="chat-area">

<!-- TOPBAR -->

<div class="topbar">

<div class="top-user">

<img
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<div>

<h2 class="text-2xl font-black">

Community Chat

</h2>

<p class="text-green-400 text-sm font-bold mt-1">

Online Now

</p>

</div>

</div>

<div class="flex items-center gap-4">

<a href="browse.html"
class="glass px-5 py-3 rounded-2xl font-black hidden md:block">

Browse

</a>

<a href="profile.html"
class="glass px-5 py-3 rounded-2xl font-black hidden md:block">

Profile

</a>

<button
onclick="logout()"
class="bg-red-500 hover:bg-red-600 px-5 py-3 rounded-2xl font-black">

Logout

</button>

</div>

</div>

<!-- MESSAGES -->

<div
id="messages"
class="messages">

</div>

<!-- INPUT -->

<div class="input-area">

<form id="chatForm">

<div class="input-wrap">

<button
type="button"
class="text-2xl">

😊

</button>

<input
type="text"
id="messageInput"
placeholder="Type a message...">

<button
type="button"
class="text-2xl">

📎

</button>

<button
type="submit"
class="send-btn">

➤

</button>

</div>

</form>

</div>

</div>

</div>

<!-- MOBILE NAV -->

<div class="mobile-nav">

<a href="index.html">

<span class="text-2xl">

🏠

</span>

Home

</a>

<a href="browse.html">

<span class="text-2xl">

🛒

</span>

Browse

</a>

<a href="upload.html">

<span class="text-2xl">

➕

</span>

Sell

</a>

<a href="chat.html"
class="text-green-400">

<span class="text-2xl">

💬

</span>

Chat

</a>

<a href="profile.html">

<span class="text-2xl">

👤

</span>

Profile

</a>

</div>

<script>

const messages =
document.getElementById(
"messages"
);

const messageInput =
document.getElementById(
"messageInput"
);

/* ONLINE */

socket.emit(
"userOnline",
currentUser.username
);

/* LOAD MESSAGES */

async function loadMessages(){

try{

const res =
await fetch(
`${API}/messages`
);

const data =
await res.json();

messages.innerHTML = "";

data.forEach(msg => {

appendMessage(msg);

});

}catch(err){

console.log(err);

}

}

loadMessages();

/* SEND */

document
.getElementById(
"chatForm"
)
.addEventListener(
"submit",
e => {

e.preventDefault();

const text =
messageInput.value.trim();

if(!text) return;

const msg = {

username:
currentUser.username,

message:text,

admin:isAdmin,

time:new Date()
.toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
})

};

socket.emit(
"sendMessage",
msg
);

messageInput.value = "";

/* AI */

if(
text.toLowerCase().includes("ai")
){

setTimeout(() => {

appendMessage({

username:"AI",

message:
generateAIReply(text),

ai:true,

time:new Date()
.toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
})

});

},1000);

}

}
);

/* RECEIVE */

socket.on(
"receiveMessage",
msg => {

appendMessage(msg);

}
);

/* APPEND */

function appendMessage(data){

const div =
document.createElement(
"div"
);

let type = "other";

if(
data.username === currentUser.username
){

type = "mine";

}

if(data.admin){

type = "admin";

}

if(data.ai){

type = "ai";

}

div.className =
`message ${type}`;

div.innerHTML = `

<div class="bubble">

<div class="username">

${
data.admin
?
"🛡 ADMIN"
:
data.ai
?
"🤖 AI"
:
data.username
}

</div>

<div class="text-[15px] leading-relaxed">

${data.message}

</div>

<div class="time">

${data.time}

</div>

</div>

`;

messages.appendChild(div);

messages.scrollTop =
messages.scrollHeight;

}

/* AI */

function generateAIReply(text){

text =
text.toLowerCase();

if(
text.includes("phone")
){

return "📱 Browse phones in marketplace.";

}

if(
text.includes("laptop")
){

return "💻 Check laptops section.";

}

if(
text.includes("price")
){

return "💰 Compare prices before buying.";

}

if(
text.includes("hello")
){

return "👋 Welcome to Swaply.";

}

if(
text.includes("scam")
){

return "⚠ Never send money before meeting seller.";

}

return "🤖 AI Assistant is here to help.";

}

/* LOGOUT */

function logout(){

localStorage.removeItem(
"swaplyUser"
);

localStorage.removeItem(
"token"
);

window.location.href =
"login.html";

}

</script>

</body>
</html>

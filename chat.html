<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Swaply Live Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-5xl mx-auto py-10 px-6">

<!-- CHAT CONTAINER -->
<div class="bg-white rounded-3xl overflow-hidden shadow-2xl">

<!-- ITEM HEADER -->
<div id="itemHeader"
class="border-b p-6 bg-white">

<div class="animate-pulse">

<div class="h-10 bg-gray-200 rounded w-1/2 mb-4"></div>

<div class="h-64 bg-gray-200 rounded-3xl"></div>

</div>

</div>

<!-- MESSAGES -->
<div
id="messages"
class="h-[500px] overflow-y-auto p-6 space-y-5 bg-gray-50">

</div>

<!-- INPUT -->
<div class="p-6 bg-white border-t">

<div class="flex gap-4">

<input
type="text"
id="messageInput"
placeholder="Type your message..."
class="flex-1 border rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-green-500"/>

<button
onclick="sendMessage()"
class="bg-green-600 hover:bg-green-700 text-white px-10 rounded-2xl font-black">

Send

</button>

</div>

</div>

</div>

</div>

<script>

const API =
"https://traderbackend.onrender.com";

const socket =
io(API);

const params =
new URLSearchParams(window.location.search);

const itemId =
params.get("id");

const room =
`item-${itemId}`;

socket.emit("joinRoom", room);

const messages =
document.getElementById("messages");


// LOAD ITEM
async function loadItem(){

try{

const res =
await fetch(`${API}/items/${itemId}`);

const item =
await res.json();

document.getElementById("itemHeader").innerHTML = `

<div class="grid md:grid-cols-2 gap-8 items-center">

<img
src="${item.image}"
class="w-full h-80 object-cover rounded-3xl"/>

<div>

<h1 class="text-5xl font-black mb-4">
${item.name}
</h1>

<p class="text-gray-600 text-lg mb-6">
${item.description}
</p>

<div class="flex items-center justify-between mb-6">

<div class="bg-green-100 text-green-700 px-5 py-3 rounded-full font-bold">
${item.category}
</div>

<div class="text-4xl font-black text-green-600">
KSh ${item.price || 0}
</div>

</div>

<p class="text-gray-500">
You are now chatting privately about this item.
</p>

</div>

</div>

`;

}catch(err){

console.log(err);

}

}

loadItem();


// RECEIVE MESSAGE
socket.on("receiveMessage", (data)=>{

messages.innerHTML += `

<div class="flex justify-end">

<div class="bg-green-600 text-white px-5 py-4 rounded-3xl max-w-md shadow-lg">

${data.message}

</div>

</div>

`;

messages.scrollTop =
messages.scrollHeight;

});


// SEND MESSAGE
function sendMessage(){

const input =
document.getElementById("messageInput");

if(!input.value.trim()) return;

socket.emit("sendMessage", {

room,
message: input.value

});

input.value = "";

}

</script>

</body>
</html>

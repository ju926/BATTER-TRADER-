<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Swaply</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md">
    <h1 class="text-3xl font-bold text-center text-green-600 mb-8">Swaply</h1>

    <form id="loginForm" class="space-y-5">

      <input id="email"
        type="email"
        placeholder="Email Address"
        class="w-full p-4 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500"
      />

      <input id="password"
        type="password"
        placeholder="Password"
        class="w-full p-4 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500"
      />

      <button class="w-full bg-green-600 text-white py-4 rounded-xl font-semibold hover:bg-green-700">
        Login
      </button>

    </form>

    <p class="text-center mt-6 text-gray-600">
      Don't have an account?
      <a href="register.html" class="text-green-600 font-semibold">Register</a>
    </p>

    <p id="msg" class="text-center mt-4 text-red-500"></p>
  </div>

<script>
const form = document.getElementById("loginForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("https://traderbackend.onrender.com/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("role", data.role);

      msg.style.color = "green";
      msg.innerText = "Login successful ✔";

      setTimeout(() => {
        window.location.href = "browse.html";
      }, 1000);

    } else {
      msg.innerText = "Invalid login ❌";
    }

  } catch (err) {
    msg.innerText = "Server error ❌";
    console.error(err);
  }
});
</script>

</body>
</html>

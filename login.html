<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Swaply Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050505;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
color:white;
overflow:hidden;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#22c55e22,transparent 30%),
radial-gradient(circle at bottom right,#16a34a22,transparent 30%);
z-index:-1;
}

/* CARD */

.card{
width:100%;
max-width:430px;
background:rgba(17,24,39,.92);
backdrop-filter:blur(20px);
padding:34px;
border-radius:32px;
border:1px solid rgba(255,255,255,.05);
box-shadow:0 20px 60px rgba(0,0,0,.4);
}

/* LOGO */

.logo{
font-size:42px;
font-weight:900;
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#9ca3af;
margin-bottom:30px;
font-size:14px;
}

/* INPUTS */

.group{
margin-bottom:18px;
}

.label{
display:block;
margin-bottom:10px;
font-size:14px;
font-weight:700;
color:#d1d5db;
}

.input{
width:100%;
height:58px;
background:#1f2937;
border:none;
outline:none;
border-radius:18px;
padding:0 18px;
font-size:15px;
color:white;
}

/* BUTTON */

.btn{
width:100%;
height:60px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-size:16px;
font-weight:900;
cursor:pointer;
margin-top:10px;
transition:.2s;
}

.btn:hover{
transform:scale(1.02);
}

/* FOOTER */

.footer{
margin-top:24px;
text-align:center;
font-size:14px;
color:#9ca3af;
}

.footer a{
color:#22c55e;
font-weight:800;
text-decoration:none;
}

/* ERROR */

.error{
margin-top:18px;
background:#dc2626;
padding:14px;
border-radius:16px;
font-size:14px;
font-weight:700;
display:none;
}

/* SUCCESS */

.success{
margin-top:18px;
background:#22c55e;
padding:14px;
border-radius:16px;
font-size:14px;
font-weight:700;
display:none;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="card">

<h1 class="logo">

Swaply

</h1>

<p class="subtitle">

Login to continue trading

</p>

<!-- EMAIL -->

<div class="group">

<label class="label">

Email

</label>

<input
type="email"
id="email"
class="input"
placeholder="Enter email">

</div>

<!-- PASSWORD -->

<div class="group">

<label class="label">

Password

</label>

<input
type="password"
id="password"
class="input"
placeholder="Enter password">

</div>

<!-- BUTTON -->

<button
class="btn"
onclick="login()">

Login

</button>

<!-- ERROR -->

<div
class="error"
id="error">

Invalid credentials

</div>

<!-- SUCCESS -->

<div
class="success"
id="success">

Login successful

</div>

<!-- FOOTER -->

<div class="footer">

Don't have an account?

<a href="signup.html">

Sign Up

</a>

</div>

</div>

<script>

/* BACKEND */

const BACKEND_URL =
"https://traderbackend.onrender.com";

/* LOGIN */

async function login(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

/* VALIDATION */

if(!email || !password){

showError(
"Please fill all fields"
);

return;

}

try{

const res =
await fetch(
`${BACKEND_URL}/login`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
password
})

}
);

const data =
await res.json();

/* SUCCESS */

if(data.user){

/* SAVE USER */

localStorage.setItem(
"swaplyUser",
JSON.stringify(data.user)
);

/* SUCCESS MESSAGE */

document.getElementById(
"success"
).style.display = "block";

document.getElementById(
"error"
).style.display = "none";

/* REDIRECT */

setTimeout(() => {

window.location.href =
"index.html";

},1000);

}else{

showError(
"Invalid credentials"
);

}

}catch(err){

showError(
"Server error"
);

}

}

/* SHOW ERROR */

function showError(message){

const error =
document.getElementById(
"error"
);

error.innerText =
message;

error.style.display =
"block";

document.getElementById(
"success"
).style.display =
"none";

}

</script>

</body>
</html>

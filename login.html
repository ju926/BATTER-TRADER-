<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Swaply Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Inter',sans-serif;
}

</style>

</head>

<body class="bg-gradient-to-br from-green-50 via-white to-gray-100 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-6xl grid lg:grid-cols-2 bg-white rounded-[40px] overflow-hidden shadow-2xl border border-gray-100">

<!-- LEFT -->
<div class="bg-gradient-to-br from-green-600 to-green-500 p-14 text-white relative overflow-hidden">

<div class="absolute top-0 right-0 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>

<div class="relative z-10">

<div class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center text-green-600 text-5xl font-black shadow-2xl mb-10">

S

</div>

<h1 class="text-6xl font-black leading-tight mb-8">

Welcome To
Swaply

</h1>

<p class="text-green-100 text-xl leading-relaxed mb-10">

Buy, sell and trade items securely with real-time private chat.

</p>

<div class="space-y-5">

<div class="flex items-center gap-4 bg-white/10 backdrop-blur-xl p-5 rounded-2xl">

<div class="w-14 h-14 rounded-2xl bg-white flex items-center justify-center text-green-600 text-2xl font-black">

✓

</div>

<div>

<h3 class="font-black text-xl">
Secure Marketplace
</h3>

<p class="text-green-100">
Protected user accounts
</p>

</div>

</div>

<div class="flex items-center gap-4 bg-white/10 backdrop-blur-xl p-5 rounded-2xl">

<div class="w-14 h-14 rounded-2xl bg-white flex items-center justify-center text-green-600 text-2xl font-black">

💬

</div>

<div>

<h3 class="font-black text-xl">
Live Chat
</h3>

<p class="text-green-100">
Real-time private messaging
</p>

</div>

</div>

<div class="flex items-center gap-4 bg-white/10 backdrop-blur-xl p-5 rounded-2xl">

<div class="w-14 h-14 rounded-2xl bg-white flex items-center justify-center text-green-600 text-2xl font-black">

⚡

</div>

<div>

<h3 class="font-black text-xl">
Fast Trading
</h3>

<p class="text-green-100">
Connect buyers and sellers instantly
</p>

</div>

</div>

</div>

</div>

</div>

<!-- RIGHT -->
<div class="p-10 lg:p-16 flex items-center">

<div class="w-full">

<div class="mb-10">

<h2 class="text-5xl font-black text-gray-900 mb-4">

Login

</h2>

<p class="text-gray-500 text-lg">

Access your Swaply account

</p>

</div>

<!-- TABS -->
<div class="flex bg-gray-100 p-2 rounded-2xl mb-10">

<button
id="loginTab"
onclick="showLogin()"
class="flex-1 py-4 rounded-2xl font-black bg-green-600 text-white transition-all">

Login

</button>

<button
id="registerTab"
onclick="showRegister()"
class="flex-1 py-4 rounded-2xl font-black text-gray-700 transition-all">

Register

</button>

</div>

<!-- LOGIN FORM -->
<div id="loginForm">

<div class="space-y-6">

<div>

<label class="block font-bold mb-3 text-gray-700">

Email

</label>

<input
type="email"
id="loginEmail"
placeholder="Enter email"
class="w-full border-2 border-gray-200 rounded-2xl px-6 py-5 text-lg outline-none focus:border-green-500 transition-all"/>

</div>

<div>

<label class="block font-bold mb-3 text-gray-700">

Password

</label>

<input
type="password"
id="loginPassword"
placeholder="Enter password"
class="w-full border-2 border-gray-200 rounded-2xl px-6 py-5 text-lg outline-none focus:border-green-500 transition-all"/>

</div>

<button
onclick="login()"
class="w-full bg-green-600 hover:bg-green-700 transition-all text-white py-5 rounded-2xl font-black text-xl shadow-2xl">

Login

</button>

</div>

</div>

<!-- REGISTER FORM -->
<div
id="registerForm"
class="hidden">

<div class="space-y-6">

<div>

<label class="block font-bold mb-3 text-gray-700">

Username

</label>

<input
type="text"
id="registerUsername"
placeholder="Choose username"
class="w-full border-2 border-gray-200 rounded-2xl px-6 py-5 text-lg outline-none focus:border-green-500 transition-all"/>

</div>

<div>

<label class="block font-bold mb-3 text-gray-700">

Email

</label>

<input
type="email"
id="registerEmail"
placeholder="Enter email"
class="w-full border-2 border-gray-200 rounded-2xl px-6 py-5 text-lg outline-none focus:border-green-500 transition-all"/>

</div>

<div>

<label class="block font-bold mb-3 text-gray-700">

Password

</label>

<input
type="password"
id="registerPassword"
placeholder="Create password"
class="w-full border-2 border-gray-200 rounded-2xl px-6 py-5 text-lg outline-none focus:border-green-500 transition-all"/>

</div>

<button
onclick="register()"
class="w-full bg-black hover:bg-gray-900 transition-all text-white py-5 rounded-2xl font-black text-xl shadow-2xl">

Create Account

</button>

</div>

</div>

</div>

</div>

</div>

<script>

const API =
"https://traderbackend.onrender.com";


// AUTO LOGIN
const token =
localStorage.getItem("token");

if(token){

window.location.href =
"index.html";

}


// SHOW LOGIN
function showLogin(){

document
.getElementById("loginForm")
.classList.remove("hidden");

document
.getElementById("registerForm")
.classList.add("hidden");

document
.getElementById("loginTab")
.classList.add(
"bg-green-600",
"text-white"
);

document
.getElementById("registerTab")
.classList.remove(
"bg-green-600",
"text-white"
);

}


// SHOW REGISTER
function showRegister(){

document
.getElementById("registerForm")
.classList.remove("hidden");

document
.getElementById("loginForm")
.classList.add("hidden");

document
.getElementById("registerTab")
.classList.add(
"bg-green-600",
"text-white"
);

document
.getElementById("loginTab")
.classList.remove(
"bg-green-600",
"text-white"
);

}


// REGISTER
async function register(){

const username =
document.getElementById("registerUsername").value;

const email =
document.getElementById("registerEmail").value;

const password =
document.getElementById("registerPassword").value;

if(!username || !email || !password){

alert("Please fill all fields");

return;

}

try{

const res =
await fetch(`${API}/register`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username,
email,
password

})

});

const data =
await res.json();

if(data.success){

alert("Account created successfully");

showLogin();

}else{

alert(data.message);

}

}catch(err){

alert("Registration failed");

}

}


// LOGIN
async function login(){

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

if(!email || !password){

alert("Please fill all fields");

return;

}

try{

const res =
await fetch(`${API}/login`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email,
password

})

});

const data =
await res.json();

if(data.token){

localStorage.setItem(
"token",
data.token
);

localStorage.setItem(
"user",
JSON.stringify(data.user)
);

window.location.href =
"index.html";

}else{

alert(data.message);

}

}catch(err){

alert("Login failed");

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help Center - Swaply</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<section class="max-w-5xl mx-auto px-6 py-20">

  <h1 class="text-5xl font-bold text-green-600 mb-12">Help Center</h1>

  <div class="space-y-6">

    <div class="bg-white p-8 rounded-2xl shadow-md">
      <h2 class="text-2xl font-bold mb-4">How do swaps work?</h2>
      <p class="text-gray-600">
        Upload an item and send swap requests to other users.
      </p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-md">
      <h2 class="text-2xl font-bold mb-4">How do I upload items?</h2>
      <p class="text-gray-600">
        Login to your account and click the Add Item button.
      </p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-md">
      <h2 class="text-2xl font-bold mb-4">How do I contact support?</h2>
      <p class="text-gray-600 mb-4">
        Reach us via email or WhatsApp.
      </p>

      <a href="https://wa.me/254780204730"
         class="inline-block bg-green-600 text-white px-6 py-3 rounded-xl hover:bg-green-700">
        WhatsApp Support
      </a>
    </div>

  </div>

</section>

</body>
</html>

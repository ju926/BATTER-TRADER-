<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swaply Upload Fix</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-20 bg-white p-6 rounded-xl shadow">

  <h1 class="text-2xl font-bold mb-6">Upload Item</h1>

  <!-- FORM -->
  <form id="itemForm" class="space-y-4">

    <input type="text" placeholder="Item Name"
      class="w-full p-3 border rounded-xl">

    <textarea placeholder="Description"
      class="w-full p-3 border rounded-xl"></textarea>

    <!-- 🔥 THIS IS YOUR BUTTON -->
    <button type="submit"
      class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700">
      Upload Item
    </button>

  </form>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
alert("JS LOADED ✔");

const firebaseConfig = {
  apiKey: "AIzaSyDpVWpHBk7KIimjKOH3TuY-BNk_2JSsuJM",
  authDomain: "swaply-85ea0.firebaseapp.com",
  projectId: "swaply-85ea0",
  storageBucket: "swaply-85ea0.appspot.com",
  messagingSenderId: "450967672050",
  appId: "1:450967672050:web:db926b43a9b9986b00ec6b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const form = document.getElementById("itemForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  alert("BUTTON CLICKED ✔");

  const name = form.querySelector('input').value;
  const desc = form.querySelector('textarea').value;

  try {
    await db.collection("items").add({
      name,
      description: desc,
      createdAt: new Date()
    });

    alert("UPLOAD SUCCESS 🚀");

    form.reset();

  } catch (err) {
    console.error(err);
    alert("UPLOAD FAILED ❌");
  }
});
</script>

</body>
</html>

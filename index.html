<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swaply</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- HEADER -->
  <div class="bg-green-600 text-white p-6 text-center">
    <h1 class="text-3xl font-bold">Swaply Live Marketplace</h1>
  </div>

  <!-- FORM -->
  <div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">

    <h2 class="text-xl font-bold mb-4">Upload Item</h2>

    <form id="itemForm" class="space-y-4">

      <input type="text" placeholder="Item Name"
        class="w-full p-3 border rounded-xl" />

      <textarea placeholder="Description"
        class="w-full p-3 border rounded-xl"></textarea>

      <select class="w-full p-3 border rounded-xl">
        <option>Select Category</option>
        <option>Kitchen</option>
        <option>Electronics</option>
        <option>Furniture</option>
        <option>Books</option>
        <option>Clothes</option>
      </select>

      <input type="text" placeholder="What do you want in exchange?"
        class="w-full p-3 border rounded-xl" />

      <button type="submit"
        class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700">
        Upload Item
      </button>

    </form>
  </div>

  <!-- LIVE ITEMS -->
  <div class="max-w-5xl mx-auto mt-10 px-4">
    <h2 class="text-2xl font-bold mb-4">📦 Available Items</h2>

    <div id="itemsContainer" class="grid md:grid-cols-3 gap-6"></div>
  </div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDpVWpHBk7KIimjKOH3TuY-BNk_2JSsuJM",
      authDomain: "swaply-85ea0.firebaseapp.com",
      projectId: "swaply-85ea0",
      storageBucket: "swaply-85ea0.appspot.com",
      messagingSenderId: "450967672050",
      appId: "1:450967672050:web:db926b43a9b9986b00ec6b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const form = document.getElementById("itemForm");
    const container = document.getElementById("itemsContainer");

    // 🔥 SAVE ITEM
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = form.querySelector('input').value;
      const description = form.querySelector('textarea').value;
      const category = form.querySelector('select').value;
      const wanted = form.querySelectorAll('input')[1].value;

      try {
        await db.collection("items").add({
          name,
          description,
          category,
          wanted,
          createdAt: new Date()
        });

        alert("Item uploaded 🚀");
        form.reset();

      } catch (err) {
        console.error(err);
        alert("Upload failed");
      }
    });

    // 🔥 LIVE FETCH ITEMS
    db.collection("items")
      .orderBy("createdAt", "desc")
      .onSnapshot(snapshot => {

        container.innerHTML = "";

        snapshot.forEach(doc => {
          const item = doc.data();

          const card = document.createElement("div");
          card.className = "bg-white p-4 rounded-xl shadow";

          card.innerHTML = `
            <h3 class="text-xl font-bold mb-2">${item.name}</h3>
            <p class="text-gray-600 mb-2">${item.description}</p>
            <p class="text-sm text-gray-500">Category: ${item.category}</p>
            <p class="text-sm text-gray-500">Wanted: ${item.wanted}</p>
          `;

          container.appendChild(card);
        });

      });

  </script>

</body>
</html>

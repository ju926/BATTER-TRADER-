<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swaply - Exchange Second-Hand Items</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<header class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <h1 class="text-3xl font-bold text-green-600">Swaply</h1>

    <nav class="hidden md:flex gap-8 font-medium">
      <a href="index.html">Home</a>
      <a href="browse.html">Browse</a>
      <a href="about.html">About</a>
      <a href="help.html">Help</a>
    </nav>

    <div class="flex gap-3">
      <a href="login.html" class="px-5 py-2 border border-green-600 text-green-600 rounded-xl">Login</a>
      <a href="register.html" class="px-5 py-2 bg-green-600 text-white rounded-xl">Sign Up</a>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="bg-green-600 text-white py-20">
  <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-10">

    <div>
      <h2 class="text-5xl font-bold mb-6">Exchange Items Easily</h2>
      <p class="text-green-100 mb-6">Swap unused items safely in your community.</p>

      <div class="flex gap-3 flex-wrap">
        <a href="browse.html" class="bg-white text-green-600 px-6 py-3 rounded-xl">Browse</a>
        <a href="register.html" class="border border-white px-6 py-3 rounded-xl">Start Swapping</a>
      </div>
    </div>

    <!-- UPLOAD -->
    <div class="bg-white text-black p-6 rounded-2xl shadow-xl">

      <h2 class="text-2xl font-bold mb-4">Upload Item</h2>

      <form id="itemForm" class="space-y-3">

        <input id="name" placeholder="Item name" class="w-full p-3 border rounded-xl" />
        <textarea id="description" placeholder="Description" class="w-full p-3 border rounded-xl"></textarea>

        <select id="category" class="w-full p-3 border rounded-xl">
          <option>Kitchen</option>
          <option>Electronics</option>
          <option>Furniture</option>
        </select>

        <input id="wanted" placeholder="What do you want?" class="w-full p-3 border rounded-xl" />

        <input type="file" id="image" class="w-full" />

        <button class="w-full bg-green-600 text-white py-3 rounded-xl">
          Upload
        </button>

      </form>

      <p id="msg" class="text-green-600 mt-2"></p>
    </div>
  </div>
</section>

<!-- ITEMS -->
<section class="p-10">
  <div id="items" class="grid md:grid-cols-3 gap-6"></div>
</section>

<script>
const API = "https://traderbackend.onrender.com";

function token() {
  return localStorage.getItem("token");
}

// LOGIN CHECK
function requireLogin() {
  if (!token()) {
    alert("Login required");
    window.location.href = "login.html";
    return false;
  }
  return true;
}

// CLOUDINARY UPLOAD
async function uploadImage(file) {
  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", "ml_default");

  const res = await fetch("https://api.cloudinary.com/v1_1/driwjor64/image/upload", {
    method: "POST",
    body: form
  });

  const data = await res.json();
  return data.secure_url;
}

// UPLOAD ITEM
document.getElementById("itemForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!requireLogin()) return;

  const file = document.getElementById("image").files[0];
  const imageURL = file ? await uploadImage(file) : "";

  await fetch(`${API}/items`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token()
    },
    body: JSON.stringify({
      name: name.value,
      description: description.value,
      category: category.value,
      wanted: wanted.value,
      imageURL
    })
  });

  msg.innerText = "Uploaded ✔";
  loadItems();
});

// LOAD ITEMS
async function loadItems() {
  const res = await fetch(`${API}/items`);
  const data = await res.json();

  items.innerHTML = data.map(item => `
    <div class="bg-white p-4 rounded-xl shadow">
      <img src="${item.imageURL}" class="h-40 w-full object-cover rounded-xl"/>
      <h3 class="font-bold text-xl mt-2">${item.name}</h3>
      <p>${item.description}</p>

      <button onclick="chat('${item._id}')"
        class="mt-3 w-full bg-green-600 text-white py-2 rounded-xl">
        Request Swap
      </button>
    </div>
  `).join("");
}

// CHAT PROTECTION
function chat(id) {
  if (!requireLogin()) return;
  window.location.href = `chat.html?item=${id}`;
}

loadItems();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swaply - Exchange Second-Hand Items</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Socket.io (for chat later) -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- NAVBAR -->
<header class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <h1 class="text-3xl font-bold text-green-600">Swaply</h1>

    <nav class="hidden md:flex gap-6">
      <a href="#" class="hover:text-green-600">Home</a>
      <a href="#items" class="hover:text-green-600">Browse</a>
    </nav>

    <a href="admin.html" class="bg-black text-white px-4 py-2 rounded-xl text-sm">
      Admin
    </a>

  </div>
</header>

<!-- HERO + UPLOAD -->
<section class="bg-green-600 text-white py-16">
  <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-10">

    <!-- TEXT -->
    <div>
      <h2 class="text-5xl font-bold mb-6">
        Buy, Sell & Swap Items Easily
      </h2>

      <p class="text-green-100 mb-6">
        Upload items, chat with sellers, and swap items directly in your community.
      </p>

      <a href="#upload" class="bg-white text-green-600 px-6 py-3 rounded-xl font-bold">
        Upload Item
      </a>
    </div>

    <!-- UPLOAD -->
    <div id="upload" class="bg-white text-black p-6 rounded-2xl shadow-xl">

      <h3 class="text-2xl font-bold mb-4">Upload Item</h3>

      <form id="uploadForm" class="space-y-4">

        <input id="name" placeholder="Item name" class="w-full p-3 border rounded-xl" required />

        <textarea id="description" placeholder="Description" class="w-full p-3 border rounded-xl"></textarea>

        <select id="category" class="w-full p-3 border rounded-xl">
          <option>Electronics</option>
          <option>Clothes</option>
          <option>Furniture</option>
          <option>Books</option>
        </select>

        <input id="wanted" placeholder="What do you want in exchange?" class="w-full p-3 border rounded-xl" />

        <input type="file" id="image" class="w-full" />

        <button class="w-full bg-green-600 text-white py-3 rounded-xl">
          Upload
        </button>

      </form>

      <p id="msg" class="text-green-600 mt-2"></p>

    </div>

  </div>
</section>

<!-- ITEMS -->
<section id="items" class="py-16 max-w-7xl mx-auto px-6">

  <h2 class="text-3xl font-bold mb-8">Latest Items</h2>

  <div id="itemsContainer" class="grid md:grid-cols-3 gap-6"></div>

</section>

<!-- CHAT BOX -->
<div id="chatBox" class="hidden fixed bottom-5 right-5 w-80 bg-white shadow-xl rounded-xl p-3">
  <div id="messages" class="h-64 overflow-y-auto border p-2 text-sm"></div>

  <input id="msgInput" class="w-full border p-2 mt-2" placeholder="Message..." />

  <button onclick="sendMessage()" class="w-full bg-green-600 text-white mt-2 p-2 rounded-xl">
    Send
  </button>
</div>

<script>

const API = "https://traderbackend.onrender.com/items";

let socket = io("https://traderbackend.onrender.com");
let currentRoom = "";

// ================= LOAD ITEMS =================
async function loadItems() {

  const res = await fetch(API);
  const items = await res.json();

  const container = document.getElementById("itemsContainer");
  container.innerHTML = "";

  items.forEach(item => {

    container.innerHTML += `
      <div class="bg-white rounded-2xl shadow p-4">

        ${item.image ? `
          <img src="${item.image}" class="w-full h-48 object-cover rounded-xl mb-3"/>
        ` : ""}

        <h3 class="text-xl font-bold">${item.name}</h3>
        <p class="text-gray-600">${item.description || ""}</p>

        <p class="text-sm text-gray-500 mt-2">
          Wanted: ${item.wanted || "Anything"}
        </p>

        <div class="flex gap-2 mt-4">

          <button onclick="requestSwap('${item._id}')"
            class="bg-yellow-500 text-white px-3 py-2 rounded-xl w-full">
            Request Swap
          </button>

          <button onclick="openChat('${item._id}')"
            class="bg-blue-600 text-white px-3 py-2 rounded-xl w-full">
            Chat Seller
          </button>

        </div>

      </div>
    `;
  });
}

// ================= UPLOAD ITEM =================
document.getElementById("uploadForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("image").files[0];

  const formData = new FormData();
  formData.append("name", name.value);
  formData.append("description", description.value);
  formData.append("category", category.value);
  formData.append("wanted", wanted.value);

  if (file) formData.append("image", file);

  const res = await fetch(API, {
    method: "POST",
    body: formData
  });

  if (res.ok) {
    msg.innerText = "Uploaded ✔";
    uploadForm.reset();
    loadItems();
  } else {
    msg.innerText = "Failed ❌";
  }
});

// ================= SWAP REQUEST =================
function requestSwap(id) {
  alert("Swap request sent ✔ (backend integration next step)");
}

// ================= CHAT =================
function openChat(itemId) {
  currentRoom = itemId;

  document.getElementById("chatBox").classList.remove("hidden");

  socket.emit("joinRoom", { roomId: itemId });
}

socket.on("receiveMessage", (msg) => {

  document.getElementById("messages").innerHTML += `
    <div><b>${msg.sender}:</b> ${msg.text}</div>
  `;
});

function sendMessage() {

  const text = document.getElementById("msgInput").value;

  socket.emit("sendMessage", {
    roomId: currentRoom,
    sender: "Guest",
    text
  });

  document.getElementById("msgInput").value = "";
}

// INIT
loadItems();

</script>

</body>
          </html>

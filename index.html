<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swaply - Exchange Second-Hand Items</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- NAVBAR -->
<header class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

    <h1 class="text-3xl font-bold text-green-600">Swaply</h1>

    <nav class="hidden md:flex gap-8 font-medium">
      <a href="index.html" class="hover:text-green-600">Home</a>
      <a href="browse.html" class="hover:text-green-600">Browse</a>
      <a href="about.html" class="hover:text-green-600">About</a>
      <a href="help.html" class="hover:text-green-600">Help</a>
    </nav>

    <div class="flex gap-3">
      <a href="login.html" class="px-5 py-2 rounded-xl border border-green-600 text-green-600 hover:bg-green-50">
        Login
      </a>

      <a href="register.html" class="px-5 py-2 rounded-xl bg-green-600 text-white hover:bg-green-700">
        Sign Up
      </a>
    </div>

  </div>
</header>

<!-- HERO -->
<section class="bg-green-600 text-white py-24">
  <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">

    <div>
      <h2 class="text-5xl font-bold mb-6">
        Exchange & Purchase Second-Hand Items
      </h2>

      <p class="text-green-100 mb-8 text-lg">
        Buy, swap, and reuse items easily with people around you.
      </p>

      <div class="flex gap-4 flex-wrap">

        <a href="browse.html" class="bg-white text-green-600 px-6 py-4 rounded-xl font-bold">
          Browse Items
        </a>

        <a href="purchase.html" class="bg-yellow-400 text-black px-6 py-4 rounded-xl font-bold">
          Purchase Items
        </a>

      </div>
    </div>

    <!-- UPLOAD BOX -->
    <div class="bg-white text-black p-6 rounded-3xl shadow-2xl">

      <h3 class="text-2xl font-bold mb-4">Upload Item</h3>

      <form id="uploadForm" class="space-y-4">

        <input id="name" placeholder="Item Name" class="w-full p-3 border rounded-xl" required>

        <textarea id="description" placeholder="Description" class="w-full p-3 border rounded-xl"></textarea>

        <input id="price" type="number" placeholder="Price (KES)" class="w-full p-3 border rounded-xl">

        <input id="wanted" placeholder="What do you want in exchange?" class="w-full p-3 border rounded-xl">

        <!-- IMAGE UPLOAD -->
        <input id="image" type="file" class="w-full">

        <button class="w-full bg-green-600 text-white py-3 rounded-xl">
          Upload Item
        </button>

      </form>

      <p id="msg" class="mt-3 text-green-600 font-semibold"></p>

    </div>

  </div>
</section>

<!-- ITEMS -->
<section class="py-20 bg-white">
  <div class="max-w-7xl mx-auto px-6">

    <h2 class="text-3xl font-bold mb-8">Latest Items</h2>

    <div id="itemsContainer" class="grid md:grid-cols-3 gap-6"></div>

  </div>
</section>

<!-- SCRIPT -->
<script>

const API = "https://traderbackend.onrender.com/items";

const form = document.getElementById("uploadForm");
const container = document.getElementById("itemsContainer");
const msg = document.getElementById("msg");

// UPLOAD
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  msg.innerText = "Uploading...";

  const formData = new FormData();

  formData.append("name", document.getElementById("name").value);
  formData.append("description", document.getElementById("description").value);
  formData.append("price", document.getElementById("price").value);
  formData.append("wanted", document.getElementById("wanted").value);

  const file = document.getElementById("image").files[0];
  if (file) formData.append("image", file);

  try {
    const res = await fetch(API, {
      method: "POST",
      body: formData
    });

    if (res.ok) {
      msg.innerText = "Uploaded successfully ✔";
      form.reset();
      loadItems();
    } else {
      msg.innerText = "Upload failed ❌";
    }

  } catch (err) {
    msg.innerText = "Server error ❌";
  }
});

// LOAD ITEMS
async function loadItems() {

  const res = await fetch(API);
  const items = await res.json();

  container.innerHTML = "";

  items.reverse().forEach(item => {

    container.innerHTML += `
      <div class="bg-gray-50 rounded-2xl shadow p-4">

        ${item.image ? `<img src="${item.image}" class="w-full h-48 object-cover rounded-xl mb-3"/>` : ""}

        <h3 class="text-xl font-bold">${item.name}</h3>

        <p class="text-gray-600">${item.description || ""}</p>

        <p class="text-green-600 font-bold text-lg">
          KES ${item.price || 0}
        </p>

        <p class="text-sm text-gray-500">
          Wants: ${item.wanted || "Anything"}
        </p>

        <button class="mt-3 w-full bg-green-600 text-white py-2 rounded-xl">
          Request Swap
        </button>

      </div>
    `;
  });
}

loadItems();

</script>

</body>
</html>

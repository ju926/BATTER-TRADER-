<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swaply - Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- NAV -->
<header class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">
    <h1 class="text-3xl font-bold text-green-600">Swaply</h1>
    <div class="flex gap-3">
      <button onclick="loadItems()" class="px-4 py-2 bg-green-600 text-white rounded-xl">
        Refresh
      </button>
    </div>
  </div>
</header>

<!-- MAIN -->
<section class="max-w-7xl mx-auto p-6 grid md:grid-cols-2 gap-8">

  <!-- UPLOAD -->
  <div class="bg-white p-6 rounded-2xl shadow-md">
    <h2 class="text-2xl font-bold mb-4">Upload Item</h2>

    <input id="name" class="w-full p-3 border rounded-xl mb-3" placeholder="Item Name">
    <textarea id="desc" class="w-full p-3 border rounded-xl mb-3" placeholder="Description"></textarea>

    <select id="category" class="w-full p-3 border rounded-xl mb-3">
      <option>Kitchen</option>
      <option>Electronics</option>
      <option>Furniture</option>
      <option>Clothes</option>
    </select>

    <input id="wanted" class="w-full p-3 border rounded-xl mb-3" placeholder="What do you want in exchange?">

    <button onclick="uploadItem()" class="w-full bg-green-600 text-white py-3 rounded-xl">
      Post Item
    </button>
  </div>

  <!-- ITEMS -->
  <div class="bg-white p-6 rounded-2xl shadow-md">
    <h2 class="text-2xl font-bold mb-4">Marketplace</h2>
    <div id="items" class="space-y-4"></div>
  </div>

</section>

<script>
const API = "http://localhost:5000";
let token = localStorage.getItem("token");

/* LOAD ITEMS */
async function loadItems() {
  const res = await fetch(`${API}/items`);
  const data = await res.json();

  const container = document.getElementById("items");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div class="border p-4 rounded-xl">
        <h3 class="text-xl font-bold">${item.name}</h3>
        <p>${item.description}</p>
        <p class="text-sm text-gray-500">${item.category}</p>
        <p class="text-green-600 font-bold">${item.wanted}</p>
      </div>
    `;
  });
}

/* UPLOAD ITEM */
async function uploadItem() {
  const name = document.getElementById("name").value;
  const description = document.getElementById("desc").value;
  const category = document.getElementById("category").value;
  const wanted = document.getElementById("wanted").value;

  if (!name || !description) return alert("Fill all fields");

  await fetch(`${API}/items`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      name,
      description,
      category,
      wanted
    })
  });

  loadItems();
}

/* INIT */
loadItems();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swaply - Exchange Second-Hand Items</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

  <!-- Navbar -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <h1 class="text-3xl font-bold text-green-600">Swaply</h1>

      <nav class="hidden md:flex gap-8 font-medium">
        <a href="index.html" class="hover:text-green-600">Home</a>
        <a href="browse.html" class="hover:text-green-600">Browse</a>
        <a href="about.html" class="hover:text-green-600">About</a>
        <a href="help.html" class="hover:text-green-600">Help</a>
      </nav>

      <div class="flex gap-3">
        <a href="login.html" class="px-5 py-2 rounded-xl border border-green-600 text-green-600 hover:bg-green-50">
          Login
        </a>

        <a href="register.html" class="px-5 py-2 rounded-xl bg-green-600 text-white hover:bg-green-700">
          Sign Up
        </a>
      </div>

    </div>
  </header>

  <!-- Hero Section -->
  <section class="bg-green-600 text-white py-24">
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">

      <div>
        <h2 class="text-5xl font-bold leading-tight mb-6">
          Exchange And Purchase Second-Hand Items Easily
        </h2>

        <p class="text-lg text-green-100 mb-8 leading-relaxed">
          Connect with people nearby and swap unused items instead of buying new ones.
          Save money, reduce waste, and build community.
        </p>

        <div class="flex gap-4 flex-wrap">

          <a href="browse.html" class="bg-white text-green-600 px-8 py-4 rounded-2xl font-semibold hover:bg-gray-100">
            Browse Items
          </a>

          <a href="register.html" class="border border-white px-8 py-4 rounded-2xl hover:bg-green-700">
            Start Swapping
          </a>

          <a href="purchase.html" class="bg-yellow-400 text-black px-8 py-4 rounded-2xl font-semibold hover:bg-yellow-300">
            Purchase Items
          </a>

        </div>
      </div>

      <!-- Upload Card -->
      <div class="bg-white text-gray-800 rounded-3xl p-8 shadow-2xl">

        <h3 class="text-3xl font-bold mb-6">Quick Item Upload</h3>

        <form id="itemForm" class="space-y-5">

          <input id="name" type="text" placeholder="Item Name"
            class="w-full p-4 rounded-xl border" required />

          <textarea id="description" placeholder="Describe your item"
            class="w-full p-4 rounded-xl border h-32" required></textarea>

          <select id="category" class="w-full p-4 rounded-xl border">
            <option>Select Category</option>
            <option>Kitchen</option>
            <option>Electronics</option>
            <option>Furniture</option>
            <option>Books</option>
            <option>Clothes</option>
          </select>

          <input id="wanted" type="text" placeholder="What do you want in exchange?"
            class="w-full p-4 rounded-xl border" />

          <input id="imageURL" type="text" placeholder="Image URL (optional)"
            class="w-full p-4 rounded-xl border" />

          <button class="w-full bg-green-600 text-white py-4 rounded-xl font-semibold hover:bg-green-700">
            Upload Item
          </button>

        </form>

        <p id="msg" class="mt-3 text-green-600 font-semibold"></p>

      </div>

    </div>
  </section>

  <!-- ITEMS DISPLAY -->
  <section class="py-20 bg-white">
    <div class="max-w-7xl mx-auto px-6">

      <h2 class="text-4xl font-bold mb-10">Latest Items</h2>

      <div id="itemsContainer" class="grid md:grid-cols-3 gap-8"></div>

    </div>
  </section>

  <!-- SCRIPT -->
  <script>

    const API = "https://traderbackend.onrender.com/items";

    const form = document.getElementById("itemForm");
    const container = document.getElementById("itemsContainer");
    const msg = document.getElementById("msg");

    // UPLOAD ITEM
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        description: document.getElementById("description").value,
        category: document.getElementById("category").value,
        wanted: document.getElementById("wanted").value,
        imageURL: document.getElementById("imageURL").value
      };

      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          msg.innerText = "Item uploaded successfully ✔";
          form.reset();
          loadItems();
        } else {
          msg.innerText = "Upload failed ❌";
        }

      } catch (err) {
        msg.innerText = "Server error ❌";
        console.error(err);
      }
    });

    // LOAD ITEMS
    async function loadItems() {
      try {
        const res = await fetch(API);
        const items = await res.json();

        container.innerHTML = "";

        items.forEach(item => {
          container.innerHTML += `
            <div class="bg-gray-50 rounded-2xl shadow p-4">

              ${item.imageURL ? `
                <img src="${item.imageURL}" class="w-full h-48 object-cover rounded-xl mb-3"/>
              ` : ""}

              <h3 class="text-xl font-bold">${item.name}</h3>
              <p class="text-gray-600">${item.description}</p>

              <p class="text-sm text-gray-500 mt-2">
                Category: ${item.category || "N/A"}
              </p>

              <p class="text-sm text-gray-500">
                Wanted: ${item.wanted || "Anything"}
              </p>

            </div>
          `;
        });

      } catch (err) {
        console.error(err);
      }
    }

    loadItems();

  </script>

</body>
  </html>

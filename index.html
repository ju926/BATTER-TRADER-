<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swaply - Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- NAVBAR -->
<header class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <h1 class="text-3xl font-bold text-green-600">Swaply</h1>

    <nav class="hidden md:flex gap-6">
      <a href="index.html">Home</a>
      <a href="browse.html">Browse</a>
      <a href="about.html">About</a>
      <a href="help.html">Help</a>
      <a href="terms.html">Terms</a>
    </nav>

    <div class="flex gap-3">
      <a href="login.html" class="px-4 py-2 border rounded-xl">Login</a>
      <a href="register.html" class="px-4 py-2 bg-green-600 text-white rounded-xl">Sign Up</a>
    </div>

  </div>
</header>

<!-- HERO -->
<section class="bg-green-600 text-white py-20">
  <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-10 items-center">

    <div>
      <h2 class="text-5xl font-bold mb-4">Trade, Swap & Sell Items Easily</h2>
      <p class="text-green-100 mb-6">
        A modern marketplace where users exchange items safely.
      </p>

      <div class="flex gap-4 flex-wrap">
        <a href="browse.html" class="bg-white text-green-600 px-6 py-3 rounded-xl">Browse</a>
        <a href="register.html" class="border px-6 py-3 rounded-xl">Start Swapping</a>
        <a href="purchase.html" class="bg-yellow-400 text-black px-6 py-3 rounded-xl">Buy</a>
      </div>
    </div>

    <!-- UPLOAD CARD -->
    <div class="bg-white p-6 rounded-3xl shadow-xl text-black">

      <h3 class="text-2xl font-bold mb-4">Upload Item</h3>

      <form id="uploadForm" class="space-y-4">

        <input id="name" placeholder="Item Name" class="w-full p-3 border rounded-xl"/>

        <textarea id="desc" placeholder="Description" class="w-full p-3 border rounded-xl"></textarea>

        <select id="category" class="w-full p-3 border rounded-xl">
          <option>Electronics</option>
          <option>Clothes</option>
          <option>Furniture</option>
          <option>Books</option>
        </select>

        <!-- IMAGE UPLOAD -->
        <input type="file" id="image" accept="image/*"
          class="w-full p-2 border rounded-xl bg-gray-50"/>

        <input id="want" placeholder="What do you want?"
          class="w-full p-3 border rounded-xl"/>

        <button class="w-full bg-green-600 text-white py-3 rounded-xl">
          Upload Item
        </button>

      </form>
    </div>

  </div>
</section>

<!-- FEATURES (UNCHANGED STRUCTURE) -->
<section class="py-16 text-center">
  <h2 class="text-3xl font-bold">Why Swaply</h2>
</section>

<!-- POPULAR ITEMS -->
<section class="py-16 bg-white">
  <div class="max-w-7xl mx-auto px-6">

    <h2 class="text-3xl font-bold mb-6">Popular Items</h2>

    <div id="itemsGrid" class="grid md:grid-cols-3 gap-6"></div>

  </div>
</section>

<!-- FOOTER (UNCHANGED) -->
<footer class="bg-gray-900 text-white p-10 text-center">
  Swaply © 2026
</footer>

<!-- APP LOGIC -->
<script>
const API = "https://traderbackend.onrender.com";

function token() {
  return localStorage.getItem("token");
}

function isLoggedIn() {
  return !!token();
}

// LOAD ITEMS INTO BROWSE
async function loadItems() {
  const res = await fetch(API + "/items");
  const data = await res.json();

  const grid = document.getElementById("itemsGrid");

  grid.innerHTML = data.map(item => `
    <div class="bg-gray-100 p-4 rounded-xl">
      <img src="${item.imageURL}" class="h-40 w-full object-cover rounded-xl"/>
      <h3 class="font-bold mt-2">${item.name}</h3>
      <p>${item.description}</p>
    </div>
  `).join("");
}

loadItems();

// UPLOAD ITEM
document.getElementById("uploadForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!isLoggedIn()) {
    alert("Login required");
    location.href = "login.html";
    return;
  }

  const file = document.getElementById("image").files[0];

  let imageURL = "";

  if (file) {
    const formData = new FormData();
    formData.append("file", file);

    const upload = await fetch(API + "/upload", {
      method: "POST",
      body: formData
    });

    const res = await upload.json();
    imageURL = res.url;
  }

  await fetch(API + "/items", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token()
    },
    body: JSON.stringify({
      name: name.value,
      description: desc.value,
      category: category.value,
      wanted: want.value,
      imageURL
    })
  });

  alert("Item uploaded!");
  loadItems();
});
</script>

</body>
</html>

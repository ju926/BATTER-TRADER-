<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swaply - Upload Items</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- PAGE -->
<div class="max-w-xl mx-auto mt-20 bg-white p-6 rounded-xl shadow">

  <h1 class="text-2xl font-bold mb-6">Upload Item</h1>

  <!-- FORM -->
  <form id="itemForm" class="space-y-4">

    <input type="text" placeholder="Item Name"
      class="w-full p-3 border rounded-xl">

    <textarea placeholder="Description"
      class="w-full p-3 border rounded-xl"></textarea>

    <input type="text" placeholder="What do you want in exchange?"
      class="w-full p-3 border rounded-xl">

    <!-- FILE INPUT (HIDDEN) -->
    <input type="file" id="itemImage" class="hidden" />

    <!-- BUTTON THAT OPENS FILES -->
    <button type="button"
      onclick="document.getElementById('itemImage').click()"
      class="w-full bg-gray-200 text-black py-3 rounded-xl font-bold hover:bg-gray-300">
      📁 Choose Image
    </button>

    <!-- FILE NAME -->
    <p id="fileName" class="text-sm text-gray-500">
      No file selected
    </p>

    <!-- UPLOAD BUTTON -->
    <button type="submit"
      class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700">
      Upload Item
    </button>

  </form>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
console.log("Page loaded ✔");

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDpVWpHBk7KIimjKOH3TuY-BNk_2JSsuJM",
  authDomain: "swaply-85ea0.firebaseapp.com",
  projectId: "swaply-85ea0",
  storageBucket: "swaply-85ea0.appspot.com",
  messagingSenderId: "450967672050",
  appId: "1:450967672050:web:db926b43a9b9986b00ec6b"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const form = document.getElementById("itemForm");
const fileInput = document.getElementById("itemImage");
const fileName = document.getElementById("fileName");

// FILE NAME DISPLAY
fileInput.addEventListener("change", () => {
  if (fileInput.files.length > 0) {
    fileName.textContent = "Selected: " + fileInput.files[0].name;
  } else {
    fileName.textContent = "No file selected";
  }
});

// FORM SUBMIT
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = form.querySelector('input[type="text"]').value;
  const desc = form.querySelector('textarea').value;
  const wanted = form.querySelectorAll('input[type="text"]')[1].value;

  const file = fileInput.files[0];

  console.log("Upload clicked");

  if (!name || !desc) {
    alert("Fill all required fields");
    return;
  }

  try {
    await db.collection("items").add({
      name,
      description: desc,
      wanted,
      createdAt: new Date()
    });

    alert("Uploaded successfully 🚀");

    form.reset();
    fileName.textContent = "No file selected";

  } catch (err) {
    console.error(err);
    alert("Upload failed ❌");
  }
});
</script>

</body>
</html>

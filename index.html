<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swaply - Exchange Second-Hand Items</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

  <!-- NAVBAR -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <h1 class="text-3xl font-bold text-green-600">Swaply</h1>

      <nav class="hidden md:flex gap-8 font-medium">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="about.html">About</a>
        <a href="help.html">Help</a>
        <a href="terms.html">Terms</a>
        <a href="chat.html" class="text-green-600 font-bold">Chat</a>
      </nav>

      <div class="flex gap-3">
        <a href="login.html" class="px-5 py-2 border border-green-600 text-green-600 rounded-xl">
          Login
        </a>
        <a href="register.html" class="px-5 py-2 bg-green-600 text-white rounded-xl">
          Sign Up
        </a>
      </div>

    </div>
  </header>

  <!-- HERO -->
  <section class="bg-green-600 text-white py-24">
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">

      <div>
        <h2 class="text-5xl font-bold mb-6">
          Exchange & Sell Second-Hand Items Easily
        </h2>

        <p class="text-green-100 mb-8">
          Connect buyers and sellers instantly with live chat and secure marketplace tools.
        </p>

        <div class="flex gap-4 flex-wrap">
          <a href="browse.html" class="bg-white text-green-600 px-8 py-4 rounded-2xl">
            Browse Items
          </a>

          <a href="register.html" class="border border-white px-8 py-4 rounded-2xl">
            Start Selling
          </a>

          <a href="chat.html" class="bg-yellow-400 text-black px-8 py-4 rounded-2xl">
            Live Chat
          </a>
        </div>
      </div>

      <!-- UPLOAD BOX -->
      <div class="bg-white text-black p-8 rounded-3xl shadow-xl">
        <h3 class="text-2xl font-bold mb-4">Upload Item</h3>

        <form id="uploadForm" class="space-y-4">

          <input id="name" class="w-full p-3 border rounded-xl" placeholder="Item name" />

          <textarea id="desc" class="w-full p-3 border rounded-xl" placeholder="Description"></textarea>

          <select id="category" class="w-full p-3 border rounded-xl">
            <option>Category</option>
            <option>Electronics</option>
            <option>Clothes</option>
            <option>Furniture</option>
          </select>

          <input type="file" id="image" class="w-full p-3 border rounded-xl" />

          <input id="want" class="w-full p-3 border rounded-xl" placeholder="What do you want in exchange?" />

          <button class="w-full bg-green-600 text-white py-3 rounded-xl">
            Upload Item
          </button>

        </form>
      </div>

    </div>
  </section>

  <!-- JS -->
  <script>
    const API = "https://traderbackend.onrender.com";

    function getToken() {
      return localStorage.getItem("token");
    }

    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!getToken()) {
        alert("Login required");
        window.location.href = "login.html";
        return;
      }

      alert("Connect backend upload API here (Cloudinary ready)");
    });
  </script>

</body>
</html>

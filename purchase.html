<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Purchase Items - Swaply</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

  <!-- Navbar -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-green-600">Swaply</h1>

      <nav class="hidden md:flex gap-6 font-medium">
        <a href="index.html" class="hover:text-green-600">Home</a>
        <a href="browse.html" class="hover:text-green-600">Browse</a>
        <a href="purchase.html" class="text-green-600 font-bold">Purchase</a>
      </nav>
    </div>
  </header>

  <!-- Title -->
  <section class="py-10 text-center">
    <h2 class="text-4xl font-bold">Buy or Request Items</h2>
    <p class="text-gray-600 mt-2">Browse items uploaded by users and request a swap or purchase</p>
  </section>

  <!-- Items Grid -->
  <section class="max-w-7xl mx-auto px-6 pb-20">
    <div id="itemsContainer" class="grid md:grid-cols-3 gap-8"></div>
  </section>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDpVWpHBk7KIimjKOH3TuY-BNk_2JSsuJM",
      authDomain: "swaply-85ea0.firebaseapp.com",
      projectId: "swaply-85ea0",
      storageBucket: "swaply-85ea0.appspot.com",
      messagingSenderId: "450967672050",
      appId: "1:450967672050:web:db926b43a9b9986b00ec6b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const container = document.getElementById("itemsContainer");

    // Load Items
    db.collection("items").orderBy("createdAt", "desc").onSnapshot(snapshot => {
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const item = doc.data();

        const card = document.createElement("div");
        card.className = "bg-white rounded-2xl shadow-md overflow-hidden";

        card.innerHTML = `
          <img src="${item.imageURL}" class="w-full h-56 object-cover" />

          <div class="p-5">
            <h3 class="text-xl font-bold mb-2">${item.name}</h3>
            <p class="text-gray-600 mb-2">${item.description}</p>
            <p class="text-sm text-gray-500 mb-2">Category: ${item.category}</p>
            <p class="text-sm text-gray-500 mb-4">Wanted: ${item.wanted}</p>

            <button onclick="requestItem('${doc.id}')"
              class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-semibold py-3 rounded-xl">
              Request / Purchase
            </button>
          </div>
        `;

        container.appendChild(card);
      });
    });

    // Request function
    function requestItem(id) {
      alert("Request sent! (Next step: add chat or swap system)");
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Swaply</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 flex items-center justify-center min-h-screen">

  <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md">
    <h1 class="text-3xl font-bold text-center text-green-600 mb-8">Create Account</h1>

    <form class="space-y-5">
      <input
        type="text"
        placeholder="Full Name"
        class="w-full p-4 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500"
      />

      <input
        type="email"
        placeholder="Email Address"
        class="w-full p-4 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500"
      />

      <input
        type="password"
        placeholder="Password"
        class="w-full p-4 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500"
      />

      <button class="w-full bg-green-600 text-white py-4 rounded-xl font-semibold hover:bg-green-700">
        Register
      </button>
    </form>

    <p class="text-center mt-6 text-gray-600">
      Already have an account?
      <a href="login.html" class="text-green-600 font-semibold">Login</a>
    </p>
  </div>

</body>
</html>

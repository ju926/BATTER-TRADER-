<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Swaply Register</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050505;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
overflow:hidden;
position:relative;
}

/* BACKGROUND */

.bg{
position:absolute;
inset:0;
overflow:hidden;
z-index:0;
}

.circle{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.35;
}

.circle1{
width:320px;
height:320px;
background:#22c55e;
top:-100px;
left:-100px;
}

.circle2{
width:300px;
height:300px;
background:#7c3aed;
bottom:-120px;
right:-120px;
}

/* CARD */

.card{
position:relative;
z-index:2;
width:100%;
max-width:430px;
background:rgba(17,24,39,.92);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:32px;
padding:32px 24px;
box-shadow:0 20px 50px rgba(0,0,0,.5);
animation:fade .4s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:40px;
font-weight:900;
color:white;
text-align:center;
}

.sub{
text-align:center;
color:#9ca3af;
font-size:14px;
margin-top:8px;
margin-bottom:28px;
line-height:1.6;
}

/* INPUTS */

.input-group{
margin-bottom:18px;
}

.label{
display:block;
color:white;
font-size:13px;
font-weight:700;
margin-bottom:8px;
}

.input{
width:100%;
height:56px;
background:#0f172a;
border:1px solid rgba(255,255,255,.06);
border-radius:18px;
padding:0 16px;
color:white;
font-size:15px;
outline:none;
transition:.2s;
}

.input:focus{
border-color:#22c55e;
box-shadow:0 0 0 3px rgba(34,197,94,.15);
}

/* BUTTON */

.btn{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-size:16px;
font-weight:900;
cursor:pointer;
margin-top:10px;
transition:.2s;
}

.btn:hover{
transform:scale(1.02);
}

/* LINKS */

.links{
margin-top:24px;
text-align:center;
}

.links a{
color:#22c55e;
font-size:14px;
font-weight:700;
text-decoration:none;
}

/* ERROR */

#error{
margin-top:16px;
text-align:center;
color:#ef4444;
font-size:14px;
font-weight:700;
display:none;
}

/* SUCCESS */

#success{
margin-top:16px;
text-align:center;
color:#22c55e;
font-size:14px;
font-weight:700;
display:none;
}

/* LOADING */

.loading{
display:none;
margin-top:18px;
text-align:center;
color:#22c55e;
font-size:14px;
font-weight:700;
}

</style>

</head>

<body>

<div class="bg">

<div class="circle circle1"></div>

<div class="circle circle2"></div>

</div>

<div class="card">

<h1 class="logo">

Swaply

</h1>

<p class="sub">

Create your account<br>

and start trading safely.

</p>

<form id="registerForm">

<div class="input-group">

<label class="label">

Username

</label>

<input
type="text"
id="username"
class="input"
placeholder="Choose username"
required>

</div>

<div class="input-group">

<label class="label">

Email

</label>

<input
type="email"
id="email"
class="input"
placeholder="Enter your email"
required>

</div>

<div class="input-group">

<label class="label">

Password

</label>

<input
type="password"
id="password"
class="input"
placeholder="Create password"
required>

</div>

<button
type="submit"
class="btn">

Create Account

</button>

<div
id="loading"
class="loading">

Creating account...

</div>

<div id="error"></div>

<div id="success"></div>

</form>

<div class="links">

<a href="login.html">

Already have account? Login

</a>

</div>

</div>

<script>

const API =
"https://traderbackend.onrender.com";

document
.getElementById(
"registerForm"
)
.addEventListener(
"submit",
async(e) => {

e.preventDefault();

const username =
document
.getElementById(
"username"
)
.value.trim();

const email =
document
.getElementById(
"email"
)
.value.trim();

const password =
document
.getElementById(
"password"
)
.value.trim();

const error =
document
.getElementById(
"error"
);

const success =
document
.getElementById(
"success"
);

const loading =
document
.getElementById(
"loading"
);

error.style.display =
"none";

success.style.display =
"none";

loading.style.display =
"block";

try{

const res =
await fetch(
`${API}/register`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
email,
password
})
}
);

const data =
await res.json();

loading.style.display =
"none";

if(data.token){

localStorage.setItem(
"token",
data.token
);

localStorage.setItem(
"user",
JSON.stringify(data.user)
);

success.style.display =
"block";

success.innerText =
"Account created successfully";

setTimeout(() => {

window.location.href =
"index.html";

},1000);

}else{

error.style.display =
"block";

error.innerText =
data.message || "Registration failed";

}

}catch(err){

console.log(err);

loading.style.display =
"none";

error.style.display =
"block";

error.innerText =
"Server error";

}

}
);

</script>

</body>
</html>

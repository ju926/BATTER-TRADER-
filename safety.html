<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safety - Swaply</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<section class="max-w-5xl mx-auto px-6 py-20">

  <div class="bg-white rounded-3xl shadow-lg p-10">

    <h1 class="text-5xl font-bold text-green-600 mb-10">Safety Tips</h1>

    <div class="space-y-6 text-lg text-gray-600">

      <div class="border-l-4 border-green-600 pl-6">
        Meet in public places when exchanging items.
      </div>

      <div class="border-l-4 border-green-600 pl-6">
        Inspect items before completing swaps.
      </div>

      <div class="border-l-4 border-green-600 pl-6">
        Report suspicious users immediately.
      </div>

      <div class="border-l-4 border-green-600 pl-6">
        Avoid sharing sensitive financial information.
      </div>

    </div>

  </div>

</section>

</body>
</html>
